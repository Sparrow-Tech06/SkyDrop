<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

#resultPopup{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000cc;

display:none;
align-items:center;
justify-content:center;
z-index:9999;

}

.result-box{

background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:90%;
max-width:400px;

}

</style>

</head>

<body>

<div class="container py-4">

<h4 id="quizTitle"></h4>

<div id="questionBox" class="mt-4"></div>

<button class="btn btn-primary mt-3" onclick="nextQuestion()">Next</button>

</div>

<!-- Result Popup -->

<div id="resultPopup">

<div class="result-box">

<h4 id="resultGame"></h4>

<h1 id="resultScore"></h1>

<p class="text-success">+10 Coins Earned</p>

<button class="btn btn-success mt-3"
onclick="goHome()">
Back Home
</button>

</div>

</div>

<script src="js/mycoins.js"></script>
<script src="js/result-popup.js"></script>
<script src="js/quiz.js"></script>

</body>
</html>
