<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://unpkg.com/vue@3"></script>

<style>

body{
background:#f4f6fb;
font-family:system-ui;
}

.quiz-app{
max-width:500px;
margin:auto;
background:white;
min-height:100vh;
}

/* header */

.quiz-header{
display:flex;
align-items:center;
padding:14px 16px;
border-bottom:1px solid #eee;
}

.back-btn{
font-size:20px;
margin-right:10px;
color:#333;
}

/* timer */

.timer-box{
padding:16px;
}

.progress{
height:6px;
}

/* question */

.question-card{
background:#f7f8ff;
padding:18px;
border-radius:12px;
font-weight:600;
margin-bottom:20px;
}

/* options */

.option{
display:flex;
align-items:center;
padding:12px;
border:1px solid #e5e6f1;
border-radius:10px;
margin-bottom:12px;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#f1f2ff;
}

.option.correct{
background:#d4edda;
border-color:#28a745;
}

.option.wrong{
background:#f8d7da;
border-color:#dc3545;
}

/* next button */

.next-btn{
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<div id="app" class="quiz-app">

<!-- header -->

<div class="quiz-header">

<a href="index.html" class="back-btn">
<i class="bi bi-arrow-left"></i>
</a>

<h6 class="m-0">{{quizTitle}}</h6>

</div>

<!-- timer -->

<div class="timer-box">

<div class="d-flex justify-content-between mb-2">

<span>Timer</span>

<span>{{current+1}} / {{questions.length}}</span>

</div>

<div class="progress">

<div class="progress-bar bg-primary"
:style="{width: progress + '%'}">
</div>

</div>

</div>

<!-- question -->

<div class="container pb-4">

<div class="question-card">
{{questions[current].question}}
</div>

<!-- options -->

<div v-for="(opt,i) in questions[current].options"
:class="optionClass(i)"
class="option"
@click="selectOption(i)">

<input type="radio"
:checked="selected===i"
disabled
class="me-2">

<span>{{opt}}</span>

</div>

<button class="btn btn-primary next-btn"
:disabled="!nextEnabled"
@click="nextQuestion">

Next Question

</button>

</div>

</div>

<script>

const {createApp} = Vue

createApp({

data(){

return{

quizTitle:"General Quiz",

current:0,

score:0,

selected:null,

answered:false,

nextEnabled:false,

time:5,

timer:null,

progress:100,

questions:[

{
question:"Capital of India?",
options:["Delhi","Mumbai","Kolkata","Chennai"],
answer:0
},

{
question:"5 + 7 = ?",
options:["10","11","12","13"],
answer:2
},

{
question:"Sun rises from?",
options:["North","South","East","West"],
answer:2
}

]

}

},

mounted(){

this.startTimer()

},

methods:{

startTimer(){

this.time=5

this.progress=100

clearInterval(this.timer)

this.timer=setInterval(()=>{

this.time--

this.progress=(this.time/5)*100

if(this.time<=0){

clearInterval(this.timer)

this.nextEnabled=true

}

},1000)

},

selectOption(i){

if(this.answered) return

this.selected=i

this.answered=true

this.nextEnabled=true

clearInterval(this.timer)

if(i===this.questions[this.current].answer){

this.score++

}

},

optionClass(i){

if(!this.answered) return ""

if(i===this.questions[this.current].answer) return "correct"

if(i===this.selected) return "wrong"

return ""

},

nextQuestion(){

this.selected=null

this.answered=false

this.nextEnabled=false

this.current++

if(this.current>=this.questions.length){

alert("Score: "+this.score+"/"+this.questions.length)

location.href="index.html"

return

}

this.startTimer()

}

}

}).mount("#app")

</script>

</body>
</html>
