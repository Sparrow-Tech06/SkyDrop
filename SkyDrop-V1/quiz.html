<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:system-ui;
}

/* app container */

.quiz-app{
max-width:500px;
margin:auto;
background:white;
min-height:100vh;
}

/* header */

.quiz-header{
display:flex;
align-items:center;
padding:14px 16px;
border-bottom:1px solid #eee;
}

.back-btn{
font-size:20px;
margin-right:12px;
color:#333;
}

/* timer section */

.timer-box{
padding:16px;
}

.progress{
height:6px;
border-radius:10px;
}

/* question card */

.question-card{
background:#f8f9ff;
padding:20px;
border-radius:12px;
font-size:18px;
font-weight:600;
margin-bottom:20px;
}

/* options */

.option{
display:flex;
align-items:center;
padding:12px 14px;
border:1px solid #e4e6ef;
border-radius:10px;
margin-bottom:12px;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#f1f3ff;
}

.option input{
margin-right:10px;
}

/* next button */

.next-btn{
width:100%;
margin-top:10px;
}

/* result popup */

#resultPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.result-box{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
width:90%;
max-width:400px;
}

</style>

</head>

<body>

<div class="quiz-app">

<!-- HEADER -->

<div class="quiz-header">

<a href="index.html" class="back-btn">
<i class="bi bi-arrow-left"></i>
</a>

<h6 class="m-0" id="quizTitle">Quiz Title</h6>

</div>

<!-- TIMER -->

<div class="timer-box">

<div class="d-flex justify-content-between mb-2">

<span>Timer</span>
<span id="qcount">1/10</span>

</div>

<div class="progress">

<div id="progressBar" class="progress-bar bg-primary" style="width:10%"></div>

</div>

</div>

<!-- QUESTION -->

<div class="container pb-4">

<div id="questionBox"></div>

<button class="btn btn-primary next-btn" onclick="nextQuestion()">
Next Question
</button>

</div>

</div>


<!-- RESULT POPUP -->

<div id="resultPopup">

<div class="result-box">

<h4 id="resultTitle"></h4>

<h1 id="resultScore"></h1>

<button class="btn btn-success mt-3" onclick="goHome()">
Back Home
</button>

</div>

</div>

<!-- scripts -->

<script src="js/mycoins.js"></script>
<script src="js/result-popup.js"></script>

<script>

const params=new URLSearchParams(location.search);
const quizId=params.get("quiz");

let quizTitle="";
let questions=[];
let current=0;
let score=0;

fetch("data/quiz-data.json")
.then(res=>res.json())
.then(data=>{

const quiz=data.quizzes.find(q=>q.id===quizId);

quizTitle=quiz.title;

document.getElementById("quizTitle").innerText=quiz.title;

questions=quiz.questions;

loadQuestion();

});

function loadQuestion(){

const q=questions[current];

document.getElementById("qcount").innerText=(current+1)+"/"+questions.length;

let progress=((current+1)/questions.length)*100;

document.getElementById("progressBar").style.width=progress+"%";

let html=`
<div class="question-card">
${q.question}
</div>
`;

q.options.forEach((opt,i)=>{

html+=`

<label class="option">

<input type="radio" name="option" value="${i}">

<span>${opt}</span>

</label>

`;

});

document.getElementById("questionBox").innerHTML=html;

}

function nextQuestion(){

const selected=document.querySelector("input[name='option']:checked");

if(!selected){

alert("Select option");
return;

}

if(parseInt(selected.value)===questions[current].answer){

score++;

}

current++;

if(current<questions.length){

loadQuestion();

}else{

showResult(score,questions.length,quizTitle);

mycoin(quizTitle);

}

}

</script>

</body>
</html>
