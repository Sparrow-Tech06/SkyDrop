<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Battle - FF Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .progress { height: 8px; border-radius: 10px; background: #e0e0e0; }
        .progress-bar { background: linear-gradient(90deg, #ff4500, #ff8c00); }
        .option-label { display: block; padding: 15px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .option-input:checked + .option-label { border-color: #ff4500; background: #fff2ed; }
        .option-input { display: none; }
        .result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <button onclick="location.href='index.html'" class="btn btn-sm btn-outline-dark">Back</button>
        <h6 id="quiz-title" class="m-0 fw-bold text-uppercase">Quiz</h6>
        <span id="q-counter" class="badge bg-dark">1/10</span>
    </div>

    <div class="progress mb-4">
        <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
    </div>

    <div id="quiz-container" class="animate__animated animate__fadeIn">
        <div class="card border-0 shadow-sm p-4 mb-4" style="border-radius: 20px;">
            <h4 id="question-text" class="fw-bold mb-4">Loading question...</h4>
            <div id="options-list"></div>
        </div>
        <button id="next-btn" class="btn btn-primary btn-lg w-100 rounded-pill py-3 shadow" style="background: #ff4500; border: none;">NEXT QUESTION</button>
    </div>
</div>

<script src="js/mycoins.js"></script>
<script src="js/result-popup.js"></script>
<script src="js/quiz.js"></script>
</body>
</html>
