<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Free Fire Quiz Pro | Play & Earn Coins</title>
    <meta name="description" content="Test your Free Fire knowledge, complete daily quizzes and earn coins in your wallet.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --ff-orange: #ff4500; --ff-dark: #1a1a1a; }
        body { background: #f4f7f6; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .navbar-brand { font-family: 'Bangers', cursive; color: var(--ff-orange) !important; font-size: 1.8rem; letter-spacing: 2px; }
        .quiz-card { border: none; border-radius: 20px; transition: 0.3s; cursor: pointer; background: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .quiz-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .icon-box { width: 70px; height: 70px; background: #fff2ed; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        .coin-btn { background: var(--ff-dark); color: gold; border-radius: 50px; padding: 5px 15px; font-weight: 600; text-decoration: none; border: 2px solid gold; }
    </style>
</head>
<body>

<header>
    <nav class="navbar navbar-light bg-white shadow-sm sticky-top p-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">FF QUIZ PRO</a>
            <a href="wallet.html" class="coin-btn animate__animated animate__pulse animate__infinite">
                💰 <span id="header-coins">0</span>
            </a>
        </div>
    </nav>
</header>

<main class="container mt-4">
    <section class="mb-4 text-center">
        <h2 class="fw-bold">Choose Battle Category</h2>
        <p class="text-muted small">Win quizzes to earn 10 coins each!</p>
    </section>

    <div class="row g-3" id="quiz-list">
        </div>
</main>

<script src="js/mycoins.js"></script>
<script src="js/home.js"></script>
</body>
</html>
