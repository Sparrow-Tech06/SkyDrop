<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Free Fire Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Layout */
.page-wrap{
max-width:660px;
margin:auto;
}

/* Card UI */
.quiz-card{
border-radius:16px;
padding:14px;
background:#ffffff;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
transition:.25s;
cursor:pointer;
}

.quiz-card:hover{
transform:translateY(-3px);
box-shadow:0 10px 24px rgba(0,0,0,0.12);
}

.quiz-icon{
width:42px;
height:42px;
object-fit:contain;
}

/* Skeleton */

.skeleton{
animation:skeleton-loading 1s linear infinite alternate;
border-radius:8px;
}

@keyframes skeleton-loading{
0%{background:#eeeeee;}
100%{background:#e0e0e0;}
}

.skeleton-img{
width:42px;
height:42px;
border-radius:8px;
}

.skeleton-text{
height:10px;
margin-bottom:6px;
width:100%;
}

.skeleton-text.small{
width:60%;
}

/* Title */
.app-title{
font-weight:700;
font-size:20px;
}

</style>

</head>


<body class="bg-light">

<div class="page-wrap">

<header class="d-flex justify-content-between align-items-center py-3 px-2">

<h1 class="app-title m-0">
Free Fire Quiz
</h1>

<a href="wallet.html" class="btn btn-warning btn-sm">
My Coins
</a>

</header>


<main>

<section class="container-fluid">

<div class="row g-3" id="quizContainer">

<!-- Skeleton Cards -->

<div class="col-6">
<div class="quiz-card d-flex align-items-center">

<div class="skeleton skeleton-img me-3"></div>

<div class="flex-grow-1">

<div class="skeleton skeleton-text"></div>
<div class="skeleton skeleton-text small"></div>

</div>

</div>
</div>

<div class="col-6">
<div class="quiz-card d-flex align-items-center">

<div class="skeleton skeleton-img me-3"></div>

<div class="flex-grow-1">

<div class="skeleton skeleton-text"></div>
<div class="skeleton skeleton-text small"></div>

</div>

</div>
</div>

<div class="col-6">
<div class="quiz-card d-flex align-items-center">

<div class="skeleton skeleton-img me-3"></div>

<div class="flex-grow-1">

<div class="skeleton skeleton-text"></div>
<div class="skeleton skeleton-text small"></div>

</div>

</div>
</div>

<div class="col-6">
<div class="quiz-card d-flex align-items-center">

<div class="skeleton skeleton-img me-3"></div>

<div class="flex-grow-1">

<div class="skeleton skeleton-text"></div>
<div class="skeleton skeleton-text small"></div>

</div>

</div>
</div>

</div>

</section>

</main>

</div>



<script>

fetch("data/quiz-data.json")

.then(res=>res.json())

.then(data=>{

const container=document.getElementById("quizContainer");

container.innerHTML="";

data.quizzes.forEach(q=>{

const card=`

<div class="col-6">

<div class="quiz-card d-flex align-items-center"

onclick="openQuiz('${q.id}')">

<img src="${q.icon}" class="quiz-icon me-3">

<div>

<div class="fw-semibold">${q.title}</div>

<small class="text-muted">
${q.questions.length} Questions
</small>

</div>

</div>

</div>

`;

container.innerHTML+=card;

});

});

function openQuiz(id){

window.location.href="quiz.html?quiz="+id;

}

</script>


</body>
</html>
