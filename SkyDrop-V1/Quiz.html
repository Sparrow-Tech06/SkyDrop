<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #4a69bd;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
        }
        body { background: #f4f6fb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Header styling from sketch */
        .quiz-header { border-bottom: 2px solid #ddd; padding: 15px; background: white; }
        .back-btn { font-size: 1.5rem; color: #333; cursor: pointer; text-decoration: none; }
        
        /* Progress & Timer */
        .stats-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .progress { height: 8px; border-radius: 10px; margin-bottom: 20px; }
        
        /* Question Box */
        .question-card {
            background: white;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 600;
        }

        /* Options styling */
        .option-item {
            display: flex;
            align-items: center;
            background: white;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .option-item:hover { background: #f0f0f0; }
        .radio-circle {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-radius: 50%;
            margin-right: 15px;
            display: inline-block;
        }

        /* Status Colors */
        .option-item.correct { background-color: var(--correct-color) !important; color: white; border-color: #27ae60; }
        .option-item.wrong { background-color: var(--wrong-color) !important; color: white; border-color: #c0392b; }
        .option-item.correct .radio-circle, .option-item.wrong .radio-circle { border-color: white; }

        /* Result Popup */
        #resultPopup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center;
            justify-content: center; z-index: 9999;
        }
        .result-box {
            background: white; padding: 40px; border-radius: 20px;
            text-align: center; width: 85%; max-width: 400px;
        }
    </style>
</head>
<body>

<div id="app" class="container mt-2">
    <div class="quiz-header d-flex align-items-center mb-3">
        <a href="javascript:history.back()" class="back-btn"><i class="bi bi-arrow-left-circle"></i></a>
        <h4 class="flex-grow-1 text-center mb-0">{{ quizTitle }}</h4>
    </div>

    <div class="stats-row px-2">
        <span class="fw-bold">Timer: {{ timeLeft }}s</span>
        <span class="fw-bold text-muted">{{ current + 1 }}/{{ questions.length }}</span>
    </div>

    <div class="progress">
        <div class="progress-bar bg-primary" role="progressbar" 
             :style="{ width: (timeLeft / 5) * 100 + '%' }"></div>
    </div>

    <div v-if="questions.length > 0" class="animate__animated animate__fadeIn">
        <div class="question-card shadow-sm">
            <h5 class="mb-0">{{ questions[current].question }}</h5>
        </div>

        <div v-for="(opt, index) in questions[current].options" 
             :key="index"
             @click="checkAnswer(index)"
             class="option-item shadow-sm animate__animated"
             :class="getOptionClass(index)">
            <span class="radio-circle"></span>
            <span>{{ opt }}</span>
        </div>

        <button class="btn btn-primary w-100 py-3 mt-3 fw-bold" 
                @click="nextQuestion" 
                :disabled="!isAnswered">
            Next Question
        </button>
    </div>

    <div id="resultPopup" v-if="showResult">
        <div class="result-box animate__animated animate__zoomIn">
            <h4 class="text-muted">Quiz Completed!</h4>
            <h1 class="display-3 fw-bold my-3 text-primary">{{ score }}/{{ questions.length }}</h1>
            <p>Well done! Coins have been added to your wallet.</p>
            <button class="btn btn-success btn-lg w-100 mt-3" @click="goHome">
                Back Home
            </button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="js/mycoins.js"></script>

<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                quizTitle: "Loading...",
                questions: [],
                current: 0,
                score: 0,
                timeLeft: 5,
                timerInterval: null,
                selectedOption: null,
                isAnswered: false,
                showResult: false
            }
        },
        mounted() {
            const params = new URLSearchParams(location.search);
            const quizId = params.get("quiz");

            fetch("data/quiz-data.json")
                .then(res => res.json())
                .then(data => {
                    const quiz = data.quizzes.find(q => q.id === quizId);
                    if(quiz) {
                        this.quizTitle = quiz.title;
                        this.questions = quiz.questions;
                        this.startTimer();
                    }
                });
        },
        methods: {
            startTimer() {
                this.timeLeft = 5;
                clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    if (this.timeLeft > 0) {
                        this.timeLeft--;
                    } else {
                        this.nextQuestion(); // Timer khatam hone par next trigger hoga
                    }
                }, 1000);
            },
            checkAnswer(index) {
                if (this.isAnswered) return; // Ek baar answer dene ke baad block

                this.isAnswered = true;
                this.selectedOption = index;
                clearInterval(this.timerInterval); // Stop timer when answered

                if (index === this.questions[this.current].answer) {
                    this.score++;
                }
            },
            getOptionClass(index) {
                if (!this.isAnswered) return '';
                
                const correctIdx = this.questions[this.current].answer;
                
                if (index === correctIdx) {
                    return 'correct animate__bounceIn';
                } else if (index === this.selectedOption && index !== correctIdx) {
                    return 'wrong animate__shakeX';
                }
                return '';
            },
            nextQuestion() {
                if (this.current < this.questions.length - 1) {
                    this.current++;
                    this.isAnswered = false;
                    this.selectedOption = null;
                    this.startTimer();
                } else {
                    this.finishQuiz();
                }
            },
            finishQuiz() {
                clearInterval(this.timerInterval);
                this.showResult = true;
                
                // Calling external coin function as requested
                // Note: Ensure mycoin() is defined in js/mycoins.js
                if(typeof mycoin === 'function') {
                    mycoin(this.quizTitle);
                }
            },
            goHome() {
                window.location.href = "index.html";
            }
        }
    }).mount('#app');
</script>

</body>
</html>
