<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet | Free Fire Quiz Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --ff-orange: #ff4500; --ff-dark: #1a1a1a; --ff-gold: #ffcc00; }
        body { background: #f8f9fa; font-family: 'Poppins', sans-serif; }
        
        /* Wallet Header Section */
        .wallet-hero { 
            background: linear-gradient(135deg, var(--ff-dark) 0%, #333 100%);
            color: white;
            padding: 40px 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .coin-display { 
            font-size: 3.5rem; 
            font-family: 'Bangers', cursive; 
            color: var(--ff-gold);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }
        
        /* History Section */
        .history-card {
            background: white;
            border: none;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border-left: 5px solid var(--ff-orange);
        }
        .history-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
        .history-date { font-size: 0.75rem; color: #888; }
        .reward-amount { color: #28a745; font-weight: 700; font-size: 1.1rem; }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="wallet-hero position-relative">
    <a href="index.html" class="back-btn">←</a>
    <p class="text-uppercase mb-1" style="letter-spacing: 2px; opacity: 0.8;">Current Balance</p>
    <div class="coin-display animate__animated animate__bounceIn">
        💰 <span id="total-coins">0</span>
    </div>
    <p class="small text-warning">Keep playing to earn more!</p>
</div>

<main class="container mt-4 pb-5">
    <h5 class="fw-bold mb-3 d-flex justify-content-between align-items-center">
        Earning History
        <span class="badge bg-light text-dark fw-normal" style="font-size: 0.7rem;">Last 30 Days</span>
    </h5>

    <div id="history-list">
        <div class="text-center py-5 text-muted" id="loading-spinner">
            <div class="spinner-border spinner-border-sm mb-2"></div>
            <p>Fetching records...</p>
        </div>
    </div>
</main>

<script src="js/mycoins.js"></script>
<script src="js/wallet.js"></script>
</body>
</html>
