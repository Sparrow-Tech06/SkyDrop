<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --gp-blue: #1a73e8;
            --text-main: #3c4043;
            --text-sub: #70757a;
            --border-color: #e8eaed;
        }

        body {
            background-color: #fff;
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Sticky Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #fff;
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-main);
            cursor: pointer;
            margin-right: 12px;
            transition: background 0.2s;
        }

        .back-btn:active {
            background: #f1f3f4;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin: 0;
        }

        /* Balance Section */
        .balance-container {
            padding: 32px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .balance-label {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .balance-value {
            font-size: 42px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #202124;
        }

        .balance-value i {
            color: #fbbc04; /* Google Gold */
            font-size: 32px;
        }

        /* History Cards */
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
            padding: 0 20px;
            margin-bottom: 16px;
        }

        .history-list {
            padding: 0 16px;
        }

        .history-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: box-shadow 0.2s ease;
        }

        .history-card:active {
            background: #f8f9fa;
        }

        .history-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-name {
            font-weight: 500;
            font-size: 15px;
            color: var(--text-main);
        }

        .coin-earned {
            font-weight: 600;
            color: #1e8e3e; /* Google Green */
            font-size: 16px;
        }

        .history-date {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 4px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-sub);
        }

        .empty-state i {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="history.back()">
            <i class="bi bi-arrow-left"></i>
        </div>
        <h1 class="header-title">My Wallet</h1>
    </div>

    <div class="container-fluid p-0">
        
        <div class="balance-container">
            <div class="balance-label">Total Balance</div>
            <div class="balance-value">
                <i class="bi bi-coin"></i>
                <span id="coinAmount">0</span>
            </div>
        </div>

        <h2 class="section-title">TRANSACTION HISTORY</h2>

        <div id="historyList" class="history-list">
            </div>

    </div>

    <script>
        let db;
        const request = indexedDB.open("QuizWallet", 1);

        request.onsuccess = function(e) {
            db = e.target.result;
            loadCoins();
            loadHistory();
        };

        // Handle first-time DB creation if needed
        request.onupgradeneeded = function(e) {
            let db = e.target.result;
            if (!db.objectStoreNames.contains("wallet")) db.createObjectStore("wallet");
            if (!db.objectStoreNames.contains("history")) db.createObjectStore("history", { autoIncrement: true });
        };

        function loadCoins() {
            const tx = db.transaction("wallet", "readonly");
            const store = tx.objectStore("wallet");
            const get = store.get("user");

            get.onsuccess = function() {
                let coins = 0;
                if (get.result) {
                    coins = get.result.coins;
                }
                document.getElementById("coinAmount").innerText = coins.toLocaleString();
            };
        }

        function loadHistory() {
            const list = document.getElementById("historyList");
            const tx = db.transaction("history", "readonly");
            const store = tx.objectStore("history");
            const items = [];

            store.openCursor().onsuccess = function(e) {
                const cursor = e.target.result;
                if (cursor) {
                    items.push(cursor.value);
                    cursor.continue();
                } else {
                    renderUI(items);
                }
            };
        }

        function renderUI(items) {
            const list = document.getElementById("historyList");
            
            if (items.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-clock-history"></i>
                        <p>No transactions yet.<br>Play a quiz to earn coins!</p>
                    </div>`;
                return;
            }

            // Newest first
            items.reverse();

            list.innerHTML = items.map(item => `
                <div class="history-card">
                    <div class="history-row">
                        <div class="game-name">${item.game}</div>
                        <div class="coin-earned">+${item.coins}</div>
                    </div>
                    <div class="history-date">${item.date}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
