<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>

body{
background:#fff;
font-family:system-ui;
}

/* header */

.quiz-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.counter{
font-weight:600;
color:#666;
}

/* card */

.question-card{
background:linear-gradient(145deg,#ffffff,#f5f7ff);
border-radius:16px;
padding:22px;
box-shadow:0 6px 20px rgba(0,0,0,0.06);
}

/* option */

.option{
display:flex;
align-items:center;
background:#eef1ff;
padding:14px;
border-radius:12px;
margin-top:12px;
cursor:pointer;
transition:.25s;
border:2px solid transparent;
font-weight:500;
}

.option:hover{
transform:scale(1.02);
}

/* option badge */

.badge-letter{
width:32px;
height:32px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-right:12px;
font-weight:700;
color:white;
}

.badge-A{background:#6a5cff;}
.badge-B{background:#ff7a18;}
.badge-C{background:#00b894;}
.badge-D{background:#e84393;}

.option.correct{
background:#d7f9e3;
border-color:#2ecc71;
}

.option.wrong{
background:#ffdede;
border-color:#e74c3c;
}

</style>

</head>

<body>

<div id="app" class="container py-4">

<div class="quiz-header">

<h5>{{quizTitle}}</h5>

<div class="counter">
{{current+1}} / {{questions.length}}
</div>

<a href="wallet.html" class="btn btn-warning btn-sm">
My Coins
</a>

</div>

<div class="question-card">

<h5 class="mb-3">
{{questions[current]?.question}}
</h5>

<div v-for="(opt,i) in questions[current]?.options"
:key="i"
class="option"
:class="optionClass(i)"
@click="selectAnswer(i)">

<div class="badge-letter"
:class="'badge-'+letters[i]">

{{letters[i]}}

</div>

<div>
{{opt}}
</div>

</div>

</div>

</div>

<!-- external scripts -->

<script src="js/mycoins.js"></script>
<script src="js/result-popup.js"></script>

<script>

const {createApp}=Vue;

createApp({

data(){

return{

quizTitle:"",
questions:[],
current:0,
score:0,
selected:null,
letters:["A","B","C","D"]

}

},

mounted(){

const params=new URLSearchParams(location.search);
const quizId=params.get("quiz");

fetch("data/quiz-data.json")

.then(r=>r.json())
.then(data=>{

const quiz=data.quizzes.find(q=>q.id===quizId);

this.quizTitle=quiz.title;
this.questions=quiz.questions;

});

},

methods:{

selectAnswer(i){

if(this.selected!==null) return;

this.selected=i;

const correct=this.questions[this.current].answer;

if(i===correct){

this.score++;

if(window.Android && typeof Android.onCorrectAnswer==="function"){

Android.onCorrectAnswer();

}

}else{

if(window.Android && typeof Android.onWrongAnswer==="function"){

Android.onWrongAnswer();

}

}

setTimeout(()=>{
this.nextQuestion();
},1000);

},

optionClass(i){

const correct=this.questions[this.current]?.answer;

if(this.selected===null) return "";

if(i===correct) return "correct";

if(i===this.selected && i!==correct) return "wrong";

return "";

},

nextQuestion(){

this.current++;
this.selected=null;

if(this.current>=this.questions.length){

/* result popup */

showResult(this.score,this.questions.length,this.quizTitle);

/* coin callback */

mycoin(this.quizTitle);

if(window.Android && typeof Android.onQuizComplete==="function"){

Android.onQuizComplete(this.score);

}

}

}

}

}).mount("#app");

</script>

</body>
</html>
