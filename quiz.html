<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>

/* ================= ROOT THEME ================= */
:root{
  --primary:#F08D39;
  --primary-light:#fff1e6;
  --bg:#fff7f0;
  --card:#ffffff;
  --text:#1a1a1a;
  --muted:#777;
  --border:#eee;

  --success:#28a745;
  --danger:#dc3545;

  --radius:16px;
  --shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* ================= GLOBAL ================= */
body{
  background:var(--bg);
  font-family: 'Segoe UI', sans-serif;
  color:var(--text);
}

/* ================= HEADER ================= */
.header-section{
  background:#111;
  color:#fff;
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

.header-section h5{
  margin:0;
  font-weight:600;
  font-size:16px;
}

.back-btn{
  border:none;
  background:transparent;
  color:#fff;
  font-size:20px;
}

/* Badge Button */
.btn-badge{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:6px 12px;
  border-radius:10px;
  font-size:13px;
}

/* ================= PROGRESS ================= */
.progress{
  height:8px;
  border-radius:10px;
  background:var(--border);
}

.progress-bar{
  background:var(--primary);
  border-radius:10px;
}

/* ================= CARD ================= */
.card-box{
  background:var(--card);
  padding:18px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

/* Question */
.question{
  font-size:18px;
  font-weight:600;
  margin-bottom:18px;
}

/* ================= OPTIONS ================= */
.option{
  background:#f8f8f8;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  cursor:pointer;
  transition:0.25s;
  border:1px solid transparent;
}

.option:hover{
  background:var(--primary-light);
  border-color:var(--primary);
}

/* Correct / Wrong */
.option.correct{
  background:var(--success);
  color:#fff;
}

.option.wrong{
  background:var(--danger);
  color:#fff;
}

.option.disabled{
  opacity:0.6;
}

/* ================= ANIMATION ================= */
.slide-enter-active,
.slide-leave-active{
  transition:all 0.3s ease;
}

.slide-enter-from{
  opacity:0;
  transform:translateX(30px);
}

.slide-leave-to{
  opacity:0;
  transform:translateX(-30px);
}

</style>

</head>

<body>

<div id="app" class="container p-0">

  <!-- HEADER -->
  <header class="header-section">
    <button class="back-btn" onclick="window.history.back()">
      <i class="bi bi-arrow-left"></i>
    </button>

    <h5>{{ quizTitle }}</h5>

    <a href="coin/prize.html" class="btn-badge">
      Badges
    </a>
  </header>

  <div class="container py-3">

    <!-- Progress -->
    <div class="d-flex justify-content-between mb-1">
      <small>{{ displayIndex }} / {{ questions.length }}</small>
    </div>

    <div class="progress mb-3">
      <div class="progress-bar" :style="{width: progress + '%'}"></div>
    </div>

    <!-- QUIZ -->
    <div v-if="!finished">

      <transition name="slide" mode="out-in">
        <div :key="current" class="card-box">

          <h5 class="question">
            {{ currentQ.question }}
          </h5>

          <div v-for="(opt,i) in currentQ.options"
               :key="i"
               class="option"
               :class="getOptionClass(i)"
               @click="select(i)">

            <b>{{ labels[i] }}</b> {{ opt }}
          </div>

        </div>
      </transition>

    </div>

    <!-- RESULT -->
    <div v-if="finished" id="resultPage"></div>

  </div>
</div>

<script src="js/mycoins.js"></script>
<script src="js/resultPage.js"></script>

<script>
const { createApp } = Vue;

createApp({
data(){
  return{
    quizId:null,
    quizTitle:"",
    questions:[],
    current:0,
    score:0,
    selected:null,
    finished:false,
    answered:false,
    labels:["A.","B.","C.","D."]
  }
},
computed:{
  currentQ(){ return this.questions[this.current] || {}; },
  displayIndex(){
    return this.current >= this.questions.length
      ? this.questions.length
      : this.current + 1;
  },
  progress(){
    return (this.current / this.questions.length) * 100;
  },
  message(){
    if(this.score === this.questions.length) return "🔥 Pro Player!";
    if(this.score >= this.questions.length/2) return "😎 Good Try!";
    return "😅 Try Again!";
  }
},
methods:{
  getOptionClass(i){
    if(!this.answered) return {};
    if(i === this.currentQ.answer) return "correct";
    if(i === this.selected) return "wrong";
    return "disabled";
  },
  select(i){
    if(this.answered) return;

    this.selected = i;
    this.answered = true;

    if(i === this.currentQ.answer){
      this.score++;
    }

    setTimeout(()=>{ this.next(); }, 600);
  },
  next(){
    this.selected = null;
    this.answered = false;
    this.current++;

    if(this.current >= this.questions.length){
      this.finished = true;

      const accuracy = (this.score / this.questions.length) * 100;

      if(accuracy >= 50){
        if(typeof mycoin === "function"){
          mycoin(this.quizId, this.quizTitle);
        }
      }

      setTimeout(()=>{
        ResultPage.show({
          score: this.score,
          total: this.questions.length,
          message: this.message,
          accuracy: accuracy
        });
      },100);
    }
  }
},
mounted(){
  const params = new URLSearchParams(location.search);
  this.quizId = params.get("quiz");

  fetch("data/quiz-data.json")
  .then(res=>res.json())
  .then(data=>{
    const quiz = data.quizzes.find(q=>q.id===this.quizId);
    if(!quiz){ alert("Invalid Quiz"); return; }

    this.quizTitle = quiz.title;
    this.questions = quiz.questions;
  });
}
}).mount("#app");
</script>

</body>
</html>
