<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#fff;
font-family:system-ui;
}

/* header */

.quiz-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.quiz-title{
font-weight:600;
font-size:18px;
}

/* counter */

.counter{
font-size:14px;
color:#777;
}

/* card */

.quiz-card{
background:#fff;
border-radius:16px;
padding:22px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
border:1px solid #eee;
}

/* question */

.question{
font-size:18px;
font-weight:600;
margin-bottom:20px;
}

/* options */

.option{
padding:12px 14px;
border-radius:10px;
border:1px solid #e3e3e3;
margin-bottom:10px;
cursor:pointer;
transition:all .2s;
}

.option:hover{
background:#f7f7f7;
}

.option.correct{
background:#d4edda;
border-color:#28a745;
}

.option.wrong{
background:#f8d7da;
border-color:#dc3545;
}

/* result popup */

#resultPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.result-box{
background:white;
padding:30px;
border-radius:14px;
text-align:center;
width:90%;
max-width:400px;
}

</style>

</head>

<body>

<div class="container py-4">

<div class="quiz-header">

<div>
<div class="quiz-title" id="quizTitle"></div>
<div class="counter" id="counter"></div>
</div>

<a href="wallet.html" class="btn btn-warning btn-sm">
My Coins
</a>

</div>

<div class="quiz-card">
<div id="questionBox"></div>
</div>

</div>

<!-- RESULT POPUP -->

<div id="resultPopup">

<div class="result-box">

<h4 id="resultTitle"></h4>

<h1 id="resultScore"></h1>

<button class="btn btn-success mt-3" onclick="goHome()">
Back Home
</button>

</div>

</div>

<script src="js/mycoins.js"></script>
<script src="js/result-popup.js"></script>

<script>

const params=new URLSearchParams(location.search);
const quizId=params.get("quiz");

let quizTitle="";
let questions=[];
let current=0;
let score=0;

fetch("data/quiz-data.json")
.then(res=>res.json())
.then(data=>{

const quiz=data.quizzes.find(q=>q.id===quizId);

quizTitle=quiz.title;

document.getElementById("quizTitle").innerText=quiz.title;

questions=quiz.questions;

loadQuestion();

});

function loadQuestion(){

const q=questions[current];

document.getElementById("counter").innerText=
(current+1)+" / "+questions.length;

let html=`<div class="question">${q.question}</div>`;

q.options.forEach((opt,i)=>{

html+=`

<div class="option" onclick="selectOption(${i})">
${opt}
</div>

`;

});

document.getElementById("questionBox").innerHTML=html;

}

function selectOption(i){

const q=questions[current];
const options=document.querySelectorAll(".option");

options.forEach((el,index)=>{

el.style.pointerEvents="none";

if(index===q.answer){

el.classList.add("correct");

}

});

if(i===q.answer){

score++;

options[i].classList.add("correct");

/* android callback */

if(window.Android && typeof Android.onCorrectAnswer==="function"){

Android.onCorrectAnswer();

}

}else{

options[i].classList.add("wrong");

/* android callback */

if(window.Android && typeof Android.onWrongAnswer==="function"){

Android.onWrongAnswer();

}

}

setTimeout(()=>{

current++;

if(current<questions.length){

loadQuestion();

}else{

showResult(score,questions.length,quizTitle);

/* coin callback */

mycoin(quizTitle);

}

},800);

}

</script>

</body>

</html>
