<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>
:root{
  --bg:#1c1c1e;
  --card:#2c2c2e;
  --accent:#ff6a00;
  --text:#fff;
  --soft:#3a3a3c;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI', sans-serif;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* PROGRESS */
.progress{
  height:6px;
  margin-bottom:15px;
}
.progress-bar{
  background:var(--accent);
}

/* CARD */
.card-box{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  border:2px solid var(--accent);
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

/* OPTION BUTTON */
.option{
  background:var(--soft);
  padding:14px;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  transition:0.25s;
}

.option:hover{
  background:var(--accent);
}

.option.active{
  background:var(--accent);
  box-shadow:0 0 12px rgba(255,106,0,0.7);
}

/* LABEL */
.option span{
  font-weight:bold;
  margin-right:8px;
}

/* BUTTON */
.btn-primary{
  background:var(--accent);
  border:none;
  width:100%;
  padding:12px;
  border-radius:10px;
  margin-top:15px;
}

/* TRANSITION */
.slide-enter-active, .slide-leave-active{
  transition: all 0.3s ease;
}
.slide-enter-from{
  opacity:0;
  transform:translateX(40px);
}
.slide-leave-to{
  opacity:0;
  transform:translateX(-40px);
}

/* RESULT */
.result-card{
  background:var(--card);
  padding:25px;
  border-radius:16px;
  border:2px solid var(--accent);
  text-align:center;
}

.score{
  font-size:42px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="app" class="container py-4">

  <!-- HEADER -->
  <div class="header mb-3">
    <h5>{{ quizTitle }}</h5>
    <a href="wallet.html" class="btn btn-warning btn-sm">💰 Coins</a>
  </div>

  <!-- PROGRESS -->
  <div class="progress">
    <div class="progress-bar" :style="{width: progress + '%'}"></div>
  </div>

  <!-- QUIZ -->
  <div v-if="!finished">

    <transition name="slide" mode="out-in">
      <div :key="current" class="card-box">

        <h5>{{ currentQ.question }}</h5>

        <div v-for="(opt,i) in currentQ.options"
             :key="i"
             class="option"
             :class="{active:selected===i}"
             @click="select(i)">

          <span>{{ labels[i] }}</span> {{ opt }}

        </div>

      </div>
    </transition>

    <button class="btn btn-primary" @click="next">
      Next Question
    </button>

  </div>

  <!-- RESULT -->
  <div v-else class="result-card">

    <h3>{{ message }}</h3>

    <div class="score">{{ score }} / {{ questions.length }}</div>

    <p class="mt-2">💰 Coins Earned: {{ coins }}</p>

    <button class="btn btn-primary mt-2" @click="restart">
      Play Again
    </button>

  </div>

</div>

<script src="js/mycoins.js"></script>

<script>
const { createApp } = Vue;

createApp({

data(){
  return{
    quizId:null,
    quizTitle:"",
    questions:[],
    current:0,
    score:0,
    selected:null,
    finished:false,
    labels:["A.","B.","C.","D."]
  }
},

computed:{
  currentQ(){
    return this.questions[this.current] || {};
  },
  progress(){
    return ((this.current) / this.questions.length) * 100;
  },
  coins(){
    return this.score * 10;
  },
  message(){
    if(this.score === this.questions.length) return "🔥 Pro Player!";
    if(this.score >= this.questions.length/2) return "😎 Good Try!";
    return "😅 Try Again!";
  }
},

methods:{

  select(i){
    this.selected = i;
  },

  next(){

    if(this.selected === null){
      alert("Please select an option");
      return;
    }

    if(this.selected === this.currentQ.answer){
      this.score++;
    }

    this.selected = null;
    this.current++;

    if(this.current >= this.questions.length){
      this.finished = true;

      // reward system (existing)
      if(typeof mycoin === "function"){
        mycoin(this.quizId, this.quizTitle);
      }
    }
  },

  restart(){
    location.reload();
  }

},

mounted(){

  const params = new URLSearchParams(location.search);
  this.quizId = params.get("quiz");

  fetch("data/quiz-data.json")
  .then(res=>res.json())
  .then(data=>{

    const quiz = data.quizzes.find(q=>q.id===this.quizId);

    if(!quiz){
      alert("Invalid Quiz");
      return;
    }

    this.quizTitle = quiz.title;
    this.questions = quiz.questions;
  });

}

}).mount("#app");
</script>

</body>
</html>
