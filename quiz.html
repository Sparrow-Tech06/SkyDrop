<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:system-ui;
}

/* header */

.quiz-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

/* question card */

.question-card{
background:#fff;
border-radius:16px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

/* option style */

.option{
background:#f1f3f8;
padding:14px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
transition:all .25s;
}

.option:hover{
background:#e8ecf7;
}

.option.correct{
background:#c9f7d1;
}

.option.wrong{
background:#ffd2d2;
}

/* progress */

.progress-box{
height:6px;
background:#e5e7ef;
border-radius:10px;
overflow:hidden;
margin-bottom:15px;
}

.progress-bar{
height:100%;
background:#4e73ff;
width:0%;
}

/* right wrong popup */

#answerPopup{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:white;
padding:12px 22px;
border-radius:30px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
display:none;
font-weight:600;
}

.right{
color:#18b566;
}

.wrong{
color:#e74c3c;
}

/* result popup */

#resultPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.result-box{
background:white;
padding:30px;
border-radius:14px;
text-align:center;
width:90%;
max-width:380px;
}

</style>
</head>

<body>

<div class="container py-4">

<div class="quiz-header">

<h5 id="quizTitle"></h5>

<a href="wallet.html" class="btn btn-warning btn-sm">
My Coins
</a>

</div>

<div class="progress-box">
<div class="progress-bar" id="progress"></div>
</div>

<div class="question-card">

<h5 id="questionText"></h5>

<div id="options"></div>

</div>

</div>

<!-- answer popup -->

<div id="answerPopup"></div>

<!-- result popup -->

<div id="resultPopup">
<div class="result-box">

<h4 id="resultTitle"></h4>

<h1 id="resultScore"></h1>

<button class="btn btn-success mt-3" onclick="goHome()">
Back Home
</button>

</div>
</div>

<script src="js/mycoins.js"></script>
<script src="js/result-popup.js"></script>

<script>

const params=new URLSearchParams(location.search);
const quizId=params.get("quiz");

let quizTitle="";
let questions=[];
let current=0;
let score=0;

fetch("data/quiz-data.json")
.then(res=>res.json())
.then(data=>{

const quiz=data.quizzes.find(q=>q.id===quizId);

quizTitle=quiz.title;

document.getElementById("quizTitle").innerText=quiz.title;

questions=quiz.questions;

loadQuestion();

});

function loadQuestion(){

const q=questions[current];

document.getElementById("questionText").innerText=q.question;

const box=document.getElementById("options");

box.innerHTML="";

q.options.forEach((opt,i)=>{

const div=document.createElement("div");

div.className="option";

div.innerText=opt;

div.onclick=()=>selectAnswer(div,i);

box.appendChild(div);

});

updateProgress();

}

function selectAnswer(el,i){

const correct=questions[current].answer;

document.querySelectorAll(".option").forEach(o=>o.onclick=null);

if(i===correct){

el.classList.add("correct");

score++;

showAnswerPopup(true);

}else{

el.classList.add("wrong");

document.querySelectorAll(".option")[correct].classList.add("correct");

showAnswerPopup(false);

}

setTimeout(()=>{

current++;

if(current<questions.length){

loadQuestion();

}else{

showResult(score,questions.length,quizTitle);

mycoin(quizTitle);

}

},1200);

}

function showAnswerPopup(isRight){

const popup=document.getElementById("answerPopup");

popup.style.display="block";

if(isRight){

popup.className="right";

popup.innerText="✔ Correct";

}else{

popup.className="wrong";

popup.innerText="✖ Wrong";

}

setTimeout(()=>{
popup.style.display="none";
},1000);

}

function updateProgress(){

const percent=((current)/questions.length)*100;

document.getElementById("progress").style.width=percent+"%";

}

</script>

</body>
</html>
