<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<link rel="stylesheet" href="css/quiz.css">
<link rel="stylesheet" href="css/global.css">
  
</head>

<body>
  
<div id="app" class="container p-0">
  
  <!-- HEADER -->
  <header class="header-section mb-3">
    <button class="back-btn" role="button" aria-label="Go back" onclick="window.history.back();">
      <i class="bi bi-arrow-left"></i>
   </button>
    <div class="title"> {{ quizTitle }} </div>
  </header>
  
<div class="container py-2">
    /* d-flex justify-content-between */
  <div class="mb-1"> Questions
    <small>{{ displayIndex }} / {{ questions.length }}</small>
  </div>

  <div class="progress mb-3">
    <div class="progress-bar" :style="{width: progress + '%'}"></div>
  </div>

  <!-- QUIZ -->
  <div v-if="!finished">

    <transition name="slide" mode="out-in">
      <div :key="current" class="card-box">

        <h5 class="question"> {{ currentQ.question }}</h5>

        <div v-for="(opt,i) in currentQ.options"
             :key="i"
             class="option"
             :class="getOptionClass(i)"
             @click="select(i)">

          <span>{{ labels[i] }}</span>
          <span class="option-text">{{ opt }}</span>
        </div>

      </div>
    </transition>

  </div>

  <!-- RESULT -->
  <div v-if="finished" id="resultPage"></div>

</div>
</div>

<script src="js/mycoins.js"></script>
<script src="js/resultPage.js"></script>

<script>
const { createApp } = Vue;

createApp({

data(){
  return{
    quizId:null,
    quizTitle:"",
    questions:[],
    current:0,
    score:0,
    selected:null,
    finished:false,
    answered:false,
    labels:["A.","B.","C.","D."]
  }
},

computed:{
  currentQ(){ return this.questions[this.current] || {}; },
  displayIndex(){
    return this.current >= this.questions.length
      ? this.questions.length
      : this.current + 1;
  },
  progress(){
    return (this.current / this.questions.length) * 100;
  },
  message(){
    if(this.score === this.questions.length) return "🔥 Pro Player!";
    if(this.score >= this.questions.length/2) return "😎 Good Try!";
    return "😅 Try Again!";
  }
},

methods:{

  getOptionClass(i){
    if(!this.answered) return {};
    if(i === this.currentQ.answer) return "correct";
    if(i === this.selected) return "wrong";
    return "disabled";
  },

  select(i){
    if(this.answered) return;

    this.selected = i;
    this.answered = true;

    if(i === this.currentQ.answer){
      this.score++;
    }

    setTimeout(()=>{ this.next(); }, 600);
  },

  next(){
    this.selected = null;
    this.answered = false;
    this.current++;

    if(this.current >= this.questions.length){
      this.finished = true;

      const accuracy = (this.score / this.questions.length) * 100;

      if(accuracy >= 50){
        if(typeof mycoin === "function"){
          mycoin(this.quizId, this.quizTitle);
        }
      }

      setTimeout(()=>{
        ResultPage.show({
          score: this.score,
          total: this.questions.length,
          message: this.message,
          accuracy: accuracy
        });
      },100);
    }
  }

},

mounted(){
  const params = new URLSearchParams(location.search);
  this.quizId = params.get("quiz");

  fetch("data/quiz-data.json")
  .then(res=>res.json())
  .then(data=>{
    const quiz = data.quizzes.find(q=>q.id===this.quizId);
    if(!quiz){ alert("Invalid Quiz"); return; }

    this.quizTitle = quiz.title;
    this.questions = quiz.questions;
  });
}

}).mount("#app");
</script>

</body>
</html>
