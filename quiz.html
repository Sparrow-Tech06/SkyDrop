<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f4f6fb;
}

/* result popup */
#resultPopup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.result-box{
  background:white;
  padding:30px;
  border-radius:12px;
  text-align:center;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<div class="container py-4">

<div class="d-flex justify-content-between mb-4">
  <h5 id="quizTitle"></h5>
  <a href="wallet.html" class="btn btn-warning btn-sm">My Coins</a>
</div>

<div id="questionBox" class="mb-4"></div>

<button class="btn btn-primary" onclick="nextQuestion()">Next Question</button>

</div>

<!-- RESULT POPUP -->
<div id="resultPopup">
  <div class="result-box">
    <h4 id="resultTitle"></h4>
    <h1 id="resultScore"></h1>
    <button class="btn btn-success mt-3" onclick="goHome()">Back Home</button>
  </div>
</div>

<!-- scripts -->
<script src="js/mycoins.js"></script>
<script src="js/result-popup.js"></script>

<script>
const params = new URLSearchParams(location.search);
const quizId = params.get("quiz");

let quizTitle = "";
let questions = [];
let current = 0;
let score = 0;

// load quiz
fetch("data/quiz-data.json")
.then(res => res.json())
.then(data => {

  const quiz = data.quizzes.find(q => q.id === quizId);

  if(!quiz){
    alert("Invalid Quiz ID");
    window.location.href = "index.html";
    return;
  }

  if(!quiz.questions || quiz.questions.length === 0){
    alert("No questions available");
    return;
  }

  quizTitle = quiz.title;

  // show icon + title
  document.getElementById("quizTitle").innerHTML = `
    <img src="${quiz.icon}" width="30" class="me-2">
    ${quiz.title}
  `;

  questions = quiz.questions;
  loadQuestion();
});

// load question
function loadQuestion(){

  const q = questions[current];

  let html = `<h5>${q.question}</h5>`;

  q.options.forEach((opt,i)=>{
    html += `
      <div class="form-check">
        <input class="form-check-input"
        type="radio"
        name="option"
        value="${i}">
        <label class="form-check-label">${opt}</label>
      </div>
    `;
  });

  document.getElementById("questionBox").innerHTML = html;
}

// next question
function nextQuestion(){

  const selected = document.querySelector("input[name='option']:checked");

  if(!selected){
    alert("Select option");
    return;
  }

  if(parseInt(selected.value) === questions[current].answer){
    score++;
  }

  current++;

  if(current < questions.length){
    loadQuestion();
  } else {

    showResult(score, questions.length, quizTitle);

    // coin reward
    mycoin(quizId, quizTitle);
  }
}
</script>

</body>
</html>
