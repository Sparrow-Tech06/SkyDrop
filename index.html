<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">           

<title> SkyDrop - Free Fire Quiz </title>

<meta name="description" content="Play Free Fire quizzes, test your knowledge and earn coins.">
<meta name="theme-color" content="#ffffff">

<link rel="preconnect" href="https://cdn.jsdelivr.net">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
<link rel="stylesheet" href="css/home.css"> 

</head>
<body>

<header>

<h1 class="brand"> SkyDrop </h1>

<nav class="header-icons">

<a href="coins/wallet.html" class="icon-btn coin-box" aria-label="Wallet">
<i class="bi bi-coin"></i> <span id="coinBalance">0</span>
</a>

<a href="notifications/notifications.html" class="icon-btn" aria-label="Wallet">
<i class="bi bi-chat-right-dots"></i>
</a>

<a href="pages/settings.html" class="icon-btn" aria-label="Settings">
<i class="bi bi-gear"></i>
</a>

</nav>

</header>

<main class="container py-5">

<section class="row g-3" id="quizContainer">

<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>

</section>

</main>

<script src="js/home.js" defer> </script>
<script>
     let db;

const request = indexedDB.open("QuizWallet",1);

request.onsuccess = function(e){

db = e.target.result;

loadCoins();

};

function loadCoins(){

const tx = db.transaction("wallet","readonly");

const store = tx.objectStore("wallet");

const get = store.get("user");

get.onsuccess = function(){

let coins = 0;

if(get.result){
coins = get.result.coins;
}

document.getElementById("coinBalance").innerText = coins;

};

}
</script>

</body>
</html>
