<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">           

<title> SkyDrop - Free Fire Quiz </title>

<meta name="description" content="Play Free Fire quizzes, test your knowledge and earn coins.">
  
<link rel="preconnect" href="https://cdn.jsdelivr.net">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
<link rel="stylesheet" href="css/home.css">

<body>

<header class="d-flex justify-content-between align-items-center">

  <!-- Left: Brand -->
  <h1 class="brand m-0 fs-5 fw-semibold">SkyDrop</h1>

  <!-- Right: Icons -->
  <nav class="d-flex align-items-center gap-3">

    <a href="coins/wallet.html" class="d-flex align-items-center text-dark text-decoration-none bg-light px-2 py-1 rounded-pill">
      <i class="bi bi-coin"></i>
      <span id="coinBtn" class="ms-1">0</span>
    </a>

    <a href="notifications/notifications.html" class="text-dark fs-5">
      <i class="bi bi-chat-right-dots"></i>
    </a>

    <a href="pages/settings.html" class="text-dark fs-5">
      <i class="bi bi-gear"></i>
    </a>

  </nav>

</header>

<main class="container py-5">

<section class="row g-3" id="quizContainer" style="max-width:660px; margin:0 auto;">

<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>

</section>

</main>

<script src="js/home.js" defer> </script>
<script src="control_center/version-check.js" defer> </script>
  
<script>
 function loadCoins(){
    let coins = parseInt(localStorage.getItem("coins")) || 0;
    document.getElementById("coinBtn").innerText = coins;  /* innerText = "Coins: " + coins;  */
}

loadCoins();
window.addEventListener("focus", loadCoins);
</script>

</body>
