<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">           

<title> SkyDrop - Free Fire Quiz </title>

<meta name="description" content="Play Free Fire quizzes, test your knowledge and earn coins.">
  
<link rel="preconnect" href="https://cdn.jsdelivr.net">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="css/home.css"> 
<link rel="stylesheet" href="css/global.css"> 

</head>
<body>

<header class="header d-flex justify-content-between align-items-center px-3 py-2">

  <!-- Brand -->
  <h1 class="brand m-0">SkyDrop</h1>

  <!-- Right Icons -->
  <nav class="d-flex align-items-center gap-2">

    <!-- Coins -->
    <a href="coins/wallet.html" class="coin-btn d-flex align-items-center">
      <i class="bi bi-coin"></i>
      <span id="coinBtn">0</span>
    </a>

    <!-- Notifications -->
    <a href="notifications/notifications.html" class="icon-circle position-relative">
      <i class="bi bi-bell"></i>
    </a>

    <!-- Settings -->
    <a href="pages/settings.html" class="icon-circle">
      <i class="bi bi-gear"></i>
    </a>

  </nav>

</header>

<main class="container pt-2 pb-5">
   
  <div class="section-title">
     <h5> Choose Your Challenge </h5>
     <p> Play quiz, get points & unlock your badges </p>
 </div>
  
<section class="row g-3" id="quizContainer" style="max-width:660px; margin:0 auto;">

<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>

</section>

<div class="bottom-nav" id="bottomNav">
  
  <a href="#" class="nav-item active"> <i class="bi bi-house-door-fill"></i> Home </a>
  <a href="#" class="nav-item"> <i class="bi bi-patch-question"></i> Quiz </a>
  <a href="#" class="play-wrapper">
    <div class="play-btn"> <i class="bi bi-controller"></i> </div>
    <div class="play-text"> Play </div>
  </a>
  <a href="#" class="nav-item"> <i class="bi bi-crosshair2"></i> Battle </a>
  <a href="#" class="nav-item"> <i class="bi bi-person-circle"></i> Profile </a>

</div>

  
</main>
  
<script src="js/reward-popup.js"></script>
<script src="js/home.js" defer> </script>
<script src="control_center/version-check.js" defer> </script>
  
<script>
 function loadCoins(){
    let coins = parseInt(localStorage.getItem("coins")) || 0;
    document.getElementById("coinBtn").innerText = coins;  /* innerText = "Coins: " + coins;  */
}

loadCoins();
window.addEventListener("focus", loadCoins);
</script>
<script>  
let lastScroll = 0;  
const navbar = document.getElementById("bottomNav");  
  
window.addEventListener("scroll", () => {  
  
  let currentScroll = window.pageYOffset;  
  
  // SCROLL DOWN = Hide NAVBAR  
  if(currentScroll > lastScroll){  
    navbar.classList.add("hide-nav");  
  }  
  
  // SCROLL UP = Show NAVBAR  
  else{  
    navbar.classList.remove("hide-nav");  
  }  
  
  // TOP AREA = ALWAYS SHOW  
  if(currentScroll < 20){  
    navbar.classList.remove("hide-nav");  
  }  
  
  lastScroll = currentScroll;  
});  
</script>
  
</body>
  </html>
