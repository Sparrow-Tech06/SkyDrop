<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Free Fire Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fb;
font-family:system-ui;
}

.app{
max-width:660px;
margin:auto;
}

/* header */

.app-header{
padding:14px 8px;
font-weight:600;
font-size:20px;
}

/* card */

.quiz-card{

background:#ffffff;

border-radius:18px;

padding:16px;

text-align:center;

box-shadow:0 6px 18px rgba(0,0,0,0.08);

transition:.25s;

}

.quiz-card:hover{

transform:translateY(-4px);

box-shadow:0 10px 24px rgba(0,0,0,0.12);

}

/* icon box */

.icon-box{

background:#eef3f8;

border-radius:12px;

padding:14px;

margin-bottom:10px;

}

.icon-box img{

width:44px;

height:44px;

object-fit:contain;

}

/* title */

.quiz-title{

font-weight:600;

font-size:15px;

margin-bottom:2px;

}

.quiz-info{

font-size:12px;

color:#777;

margin-bottom:10px;

}

/* button */

.enroll-btn{

width:100%;

border:none;

border-radius:20px;

padding:7px;

font-size:13px;

color:#fff;

background:#3da1c9;

}

/* skeleton */

.skeleton{

animation:skeleton 1s linear infinite alternate;

border-radius:10px;

}

@keyframes skeleton{

0%{background:#ececec}

100%{background:#e0e0e0}

}

.skeleton-box{

height:72px;

margin-bottom:10px;

}

.skeleton-text{

height:10px;

margin-bottom:6px;

}

</style>

</head>


<body>

<div class="app">

<header class="app-header d-flex justify-content-between align-items-center">

<span>Free Fire Quiz</span>

<a href="wallet.html" class="btn btn-warning btn-sm">My Coins</a>

</header>


<main>

<section class="container-fluid">

<div class="row g-3" id="quizContainer">


<!-- skeleton cards -->

<div class="col-6">
<div class="quiz-card">

<div class="skeleton skeleton-box"></div>

<div class="skeleton skeleton-text"></div>

<div class="skeleton skeleton-text"></div>

</div>
</div>

<div class="col-6">
<div class="quiz-card">

<div class="skeleton skeleton-box"></div>

<div class="skeleton skeleton-text"></div>

<div class="skeleton skeleton-text"></div>

</div>
</div>

</div>

</section>

</main>

</div>



<script>

fetch("data/quiz-data.json")

.then(res=>res.json())

.then(data=>{

const container=document.getElementById("quizContainer");

container.innerHTML="";

data.quizzes.forEach(q=>{

const card=`

<div class="col-6">

<div class="quiz-card" onclick="openQuiz('${q.id}')">

<div class="icon-box">

<img src="${q.icon}">

</div>

<div class="quiz-title">

${q.title}

</div>

<div class="quiz-info">

${q.questions.length} Questions

</div>

<button class="enroll-btn">

Play Quiz

</button>

</div>

</div>

`;

container.innerHTML+=card;

});

});


function openQuiz(id){

window.location.href="quiz.html?quiz="+id;

}

</script>


</body>
</html>
