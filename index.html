  <!-- Brand -->

  <!-- Right Icons -->

    <!-- Coins -->

      <i class="bi bi-coin"></i>
      <span id="coinBtn">0</span>
    </a>

    <!-- Notifications -->

<main class="container py-5">

<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>
<div class="col-6"><div class="skeleton"></div></div>

</section>

</main>

<script src="js/home.js" defer> </script>
<script src="control_center/version-check.js" defer> </script>
  
<script>
(function () {
  const COIN_KEY = "coins";
  const el = document.getElementById("coinBtn");

  // Safe getter
  function getCoins() {
    const val = parseInt(localStorage.getItem(COIN_KEY), 10);
    return isNaN(val) ? 0 : val;
  }

  // Clamp (negative avoid)
  function sanitizeCoins(value) {
    return Math.max(0, parseInt(value, 10) || 0);
  }

  // Format (future-proof for big numbers)
  function formatCoins(value) {
    return value.toLocaleString("en-IN");
  }

  // Animation (optimized with cancel support)
  let rafId = null;

  function animateCoins(targetValue) {
    if (!el) return;

    targetValue = sanitizeCoins(targetValue);

    // cancel previous animation (important)
    if (rafId) cancelAnimationFrame(rafId);

    let startValue = parseInt(el.textContent.replace(/,/g, ""), 10) || 0;

    // अगर same value है → no animation
    if (startValue === targetValue) {
      el.textContent = formatCoins(targetValue);
      return;
    }

    const duration = 700;
    const startTime = performance.now();

    function update(currentTime) {
      const progress = Math.min((currentTime - startTime) / duration, 1);

      // easeOutCubic
      const ease = 1 - Math.pow(1 - progress, 3);

      const value = Math.floor(startValue + (targetValue - startValue) * ease);
      el.textContent = formatCoins(value);

      if (progress < 1) {
        rafId = requestAnimationFrame(update);
      } else {
        el.textContent = formatCoins(targetValue);
      }
    }

    rafId = requestAnimationFrame(update);
  }

  // Load coins (same API as yours)
  function loadCoins() {
    animateCoins(getCoins());
  }

  // Public update function (reward system ke liye)
  window.updateCoins = function (newCoins) {
    const safeValue = sanitizeCoins(newCoins);
    localStorage.setItem(COIN_KEY, safeValue);
    animateCoins(safeValue);
  };

  // Init
  document.addEventListener("DOMContentLoaded", loadCoins);
  window.addEventListener("focus", loadCoins);

})();
</script>
</body>
  </html>
