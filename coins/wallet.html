<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Wallet page showing coin balance and earning history">
<title>Wallet</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../css/global.css">
  
<style>

:root{
  --primary:#2563eb;
  --success:#16a34a;
  --text:#111827;
  --muted:#6b7280;
}
/************* Balance Card *************/
.balance-card{
  margin:15px; position:sticky ; top: 60px ;
  padding:20px;
  border-radius:16px;
  background:#fff;
  text-align:center;
}

.balance-card h3{
  font-size:28px;
  font-weight:700;
  color:var(--primary);
}

/***************** Section ************/
section{
  padding:0 15px 20px;
}

.section-title{
  font-size:13px;
  color:var(--muted);
  margin-bottom:10px;
}

/* History Item */
.history-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
  background:#fff;
}

.history-left{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
}

/* Icon */
.icon-box{
  width:40px;
  height:40px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:16px;
}

/* Colors */
.history-item:nth-child(5n+1) {background:#2563eb;}
.history-item:nth-child(5n+2) .icon-box{background:#16a34a;}
.history-item:nth-child(5n+3) .icon-box{background:#ea580c;}
.history-item:nth-child(5n+4) .icon-box{background:#db2777;}
.history-item:nth-child(5n+5) .icon-box{background:#0891b2;}

.details{
  flex:1;
}

.details div:first-child{
  font-weight:500;
}

.amount{
  font-weight:700;
  color:var(--success);
  white-space:nowrap;
}

.date{
  font-size:12px;
  color:var(--muted);
}

/* Empty */
.empty{
  text-align:center;
  padding:30px 15px;
  color:var(--muted);
  font-size:14px;
}

.empty i{
  font-size:28px;
  margin-bottom:8px;
  display:block;
}

</style>

</head>

<body>

<header class="header-section">
  <button class="back-btn" role="button" aria-label="Go back" onclick="window.history.back();">
    <i class="bi bi-arrow-left"></i>
  </button>
  <div class="title"> My FirePoint </div>
</header>

<main>
  
<section class="balance-wrapper">
  <div class="balance-card">
    <p class="text-muted mb-1"> Total FirePoints </p>
    <h3 id="coinBalance">0</h3>
  </div>
</section>

<section>
  <div class="section-title">Transaction History</div>
  <div id="historyList"></div>
</section>

</main>

<script>

function goBack(){
  window.history.back();
}

/* Load Data */
let coins = parseInt(localStorage.getItem("coins")) || 0;

let history;
try{
  history = JSON.parse(localStorage.getItem("coinHistory")) || [];
}catch(e){
  history = [];
}

/* Set Coins */
document.getElementById("coinBalance").innerText = coins;

/* Render History */
let list = document.getElementById("historyList");

/* Empty state */
if(history.length === 0){
  list.innerHTML = `
    <div class="empty">
      <i class="bi bi-wallet2"></i>
      No transactions yet<br>
      <small>Play quiz to earn coins</small>
    </div>
  `;
}else{

  history.slice().reverse().forEach((h)=>{

    let item = document.createElement("div");
    item.className = "history-item";

    item.innerHTML = `
      <div class="history-left">
        <div class="icon-box">
          <i class="bi bi-coin"></i>
        </div>

        <div class="details">
          <div>${h.quiz || "Quiz Reward"}</div>
          <div class="date">${h.date || "Recently"}</div>
        </div>
      </div>

      <div class="amount">+${h.reward || 0}</div>
    `;

    list.appendChild(item);
  });
}

/* Motivation message */
if(history.length > 0 && history.length < 3){
  let msg = document.createElement("div");
  msg.className = "empty";
  msg.innerHTML = "Keep playing to earn more rewards 🚀";
  list.appendChild(msg);
}

</script>

</body>
  </html>
