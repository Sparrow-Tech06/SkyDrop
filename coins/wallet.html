<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Wallet page showing FirePoint balance and Activity history">
<title>Wallet</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/wallet.css">

</head>

<body>

<header class="header-section">
  <button class="back-btn" role="button" aria-label="Go back" onclick="window.history.back();">
    <i class="bi bi-arrow-left"></i>
  </button>
  <div class="title"> My FirePoint </div>
</header>

<main>
  
<section class="balance-wrapper">
  <div class="balance-card">
    <p class="text-muted mb-1"> Total FirePoints </p>
    <h3 id="coinBalance">0</h3>
  </div>
</section>

<section>
  <div class="section-title"> Score Activity </div>
  <div id="historyList"></div>
</section>

</main>

<script>

function goBack(){
  window.history.back();
}

/* Load Data */
let coins = parseInt(localStorage.getItem("coins")) || 0;

let history;
try{
  history = JSON.parse(localStorage.getItem("coinHistory")) || [];
}catch(e){
  history = [];
}

/* Set Coins */
document.getElementById("coinBalance").innerText = coins;

/* Render History */
let list = document.getElementById("historyList");

/* Empty state */
if(history.length === 0){
  list.innerHTML = `
    <div class="empty">
      <i class="bi bi-wallet2"></i>
      No activity yet<br>
      <small> Keep playing to gain points </small>
    </div>
  `;
}else{

  history.slice().reverse().forEach((h)=>{

    let item = document.createElement("div");
    item.className = "history-item";

    item.innerHTML = `
      <div class="history-left">
        <div class="icon-box">
          <i class="bi bi-coin"></i>
        </div>

        <div class="details">
          <div>${h.quiz || "Quiz Reward"}</div>
          <div class="date">${h.date || "Recently"}</div>
        </div>
      </div>

      <div class="amount">+${h.reward || 0}</div>
    `;

    list.appendChild(item);
  });
}

/* Motivation message */
if(history.length > 0 && history.length < 3){
  let msg = document.createElement("div");
  msg.className = "empty";
  msg.innerHTML = "Keep playing to gain points";
  list.appendChild(msg);
}

</script>

</body>
  </html>
