<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Wallet page showing FirePoint balance and Activity history">
<title> SkyDrop - FirePoint Activity </title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/wallet.css">

</head>

<body>

<header class="header-section">
  <button class="back-btn" role="button" aria-label="Go back" onclick="window.history.back();">
    <i class="bi bi-arrow-left"></i>
  </button>
  <div class="title"> My FirePoint </div>
</header>

<main>
  
<section class="balance-wrapper">
  <div class="balance-card">
    <p class="mb-1"> Total FirePoints </p>
    <h3 id="coinBalance">0</h3>

    <div class="level-container">
      <div class="level-header">
        <span class="level-badge" id="lvlLabel">Level 1</span>
        <span class="next-lvl-text" id="nextLvlLabel">Next: Level 2</span>
      </div>
      <div class="progress-slim">
        <div class="progress-bar-fill" id="lvlProgress"></div>
      </div>
      <div class="dist-msg" id="lvlDist">Updating...</div>
    </div>
  </div>
</section>

<section>
  <div class="section-title"> Score Activity </div>
  <div id="historyList"></div>
</section>

</main>

<script>

/* Load Data */
let coins = parseInt(localStorage.getItem("coins")) || 0;

let history;
try{
  history = JSON.parse(localStorage.getItem("coinHistory")) || [];
}catch(e){
  history = [];
}

/* Set Coins */
document.getElementById("coinBalance").innerText = coins.toLocaleString();

/* --- LEVEL SYSTEM LOGIC --- */
const LEVELS = [
    {level: 1, required: 0},
    {level: 2, required: 100},
    {level: 3, required: 500},
    {level: 4, required: 1200},
    {level: 5, required: 3000}
];

function updateLevelUI() {
    let currentLvl = LEVELS[0];
    let nextLvl = null;

    for (let i = 0; i < LEVELS.length; i++) {
        if (coins >= LEVELS[i].required) {
            currentLvl = LEVELS[i];
            nextLvl = LEVELS[i + 1];
        }
    }

    const lvlLabel = document.getElementById("lvlLabel");
    const nextLvlLabel = document.getElementById("nextLvlLabel");
    const lvlProgress = document.getElementById("lvlProgress");
    const lvlDist = document.getElementById("lvlDist");

    lvlLabel.innerText = `Level ${currentLvl.level}`;

    if (nextLvl) {
        let needed = nextLvl.required - coins;
        let range = nextLvl.required - currentLvl.required;
        let progressInLevel = coins - currentLvl.required;
        let percent = (progressInLevel / range) * 100;

        nextLvlLabel.innerText = `Next: Level ${nextLvl.level}`;
        lvlProgress.style.width = percent + "%";
        lvlDist.innerHTML = `Need <span class="coin-highlight">${needed}</span> more points to level up`;
    } else {
        nextLvlLabel.innerText = `Max Level`;
        lvlProgress.style.width = "100%";
        lvlDist.innerText = "You are at the highest level! 🏆";
    }
}
updateLevelUI();
/* -------------------------- */

/* Render History */
let list = document.getElementById("historyList");

/* Empty state */
if(history.length === 0){
  list.innerHTML = `
    <div class="empty">
      <i class="bi bi-wallet2"></i>
      No activity yet<br>
      <small> Keep playing to gain points </small>
    </div>
  `;
}else{

  history.slice().reverse().forEach((h)=>{
    let item = document.createElement("div");
    item.className = "history-item";

    item.innerHTML = `
      <div class="history-left">
        <div class="icon-box">
          <i class="bi bi-coin"></i>
        </div>

        <div class="details">
          <div>${h.quiz || "Quiz Reward"}</div>
          <div class="date">${h.date || "Recently"}</div>
        </div>
      </div>

      <div class="amount">+${h.reward || 0}</div>
    `;
    list.appendChild(item);
  });
}

/* Motivation message */
if(history.length > 0 && history.length < 3){
  let msg = document.createElement("div");
  msg.className = "empty";
  msg.innerHTML = "Keep playing to gain points";
  list.appendChild(msg);
}

</script>

</body>
</html>
