<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wallet</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f4f6fb;
}
</style>
</head>

<body>

<div class="container py-4">

<h3 class="mb-3">My Wallet</h3>

<div class="card p-3 mb-3 text-center">
  <h4 id="coinBalance">Coins: 0</h4>
</div>

<h5>History</h5>
<ul class="list-group" id="historyList"></ul>

</div>

<script>
let coins = localStorage.getItem("coins") || 0;
document.getElementById("coinBalance").innerText = "Coins: " + coins;

let history = JSON.parse(localStorage.getItem("coinHistory")) || [];

let list = document.getElementById("historyList");

if(history.length === 0){
  list.innerHTML = "<li class='list-group-item'>No history</li>";
}else{
  history.reverse().forEach(h=>{
    list.innerHTML += `
      <li class="list-group-item">
        +${h.reward} coins from ${h.quiz} <br>
        <small>${h.date}</small>
      </li>
    `;
  });
}
</script>

</body>
</html>
