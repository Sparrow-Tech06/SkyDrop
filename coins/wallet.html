<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Wallet page showing coin balance and earning history">
<title>Wallet</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

:root{
  --primary:#2563eb;
  --success:#16a34a;
  --text:#111827;
  --muted:#6b7280;
}

body{
  margin:0;
  background:#fff;
  font-family: system-ui, -apple-system;
  color:var(--text);
}

/* Header */
header{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
  padding:12px 14px;
  border-bottom:1px solid #eee;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* Left side */
.header-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.back-btn{
  font-size:20px;
  cursor:pointer;
}

/* Right coin */
.header-coins{
  font-weight:600;
  color:var(--primary);
  display:flex;
  align-items:center;
  gap:5px;
}

/* Balance Card */
.balance-card{
  margin:15px;
  padding:16px;
  border-radius:14px;
  background:#f9fafb;
  text-align:center;
}

/* Section */
section{
  padding:0 15px 20px;
}

.section-title{
  font-size:13px;
  color:var(--muted);
  margin-bottom:8px;
}

/* History Item */
.history-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  background:#fafafa;
}

/* Icon */
.icon-box{
  width:40px;
  height:40px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:18px;
}

/* nth-child colors */
.history-item:nth-child(5n+1) .icon-box{background:#2563eb;}
.history-item:nth-child(5n+2) .icon-box{background:#16a34a;}
.history-item:nth-child(5n+3) .icon-box{background:#ea580c;}
.history-item:nth-child(5n+4) .icon-box{background:#db2777;}
.history-item:nth-child(5n+5) .icon-box{background:#0891b2;}

/* Text */
.details{
  flex:1;
}

.amount{
  font-weight:600;
  color:var(--success);
}

.date{
  font-size:12px;
  color:var(--muted);
}

/* Empty */
.empty{
  text-align:center;
  padding:25px;
  color:var(--muted);
  font-size:14px;
}

</style>

</head>

<body>

<!-- Header -->
<header>
  
  <div class="header-left">
    <i class="bi bi-arrow-left back-btn" onclick="goBack()"></i>
    <span>My Wallet</span>
  </div>

  <div class="header-coins">
    <i class="bi bi-coin"></i>
    <span id="coinBalanceTop">0</span>
  </div>

</header>

<main>

<!-- Balance Card -->
<section class="balance-card">
  <p class="text-muted mb-1">Total Coins</p>
  <h3 id="coinBalance">0</h3>
</section>

<!-- History -->
<section>
  <div class="section-title">Transaction History</div>
  <div id="historyList"></div>
</section>

</main>

<script>

/* Back Button */
function goBack(){
  window.history.back();
}

/* Load Data */
let coins = parseInt(localStorage.getItem("coins")) || 0;
let history = JSON.parse(localStorage.getItem("coinHistory")) || [];

/* Set Coins (NO animation now) */
document.getElementById("coinBalance").innerText = coins;
document.getElementById("coinBalanceTop").innerText = coins;

/* Render History */
let list = document.getElementById("historyList");

/* If no data */
if(history.length === 0){
  list.innerHTML = `
    <div class="empty">
      No transactions yet<br>
      <small>Play quiz to earn coins</small>
    </div>
  `;
}else{
  history.reverse().forEach((h)=>{
    let item = document.createElement("div");
    item.className = "history-item";

    item.innerHTML = `
      <div class="icon-box">
        <i class="bi bi-coin"></i>
      </div>

      <div class="details">
        <div class="amount">+${h.reward} coins</div>
        <div>${h.quiz}</div>
        <div class="date">${h.date}</div>
      </div>
    `;

    list.appendChild(item);
  });
}

/* Subtle feature: auto message if history very small */
if(history.length > 0 && history.length < 3){
  let msg = document.createElement("div");
  msg.className = "empty";
  msg.innerHTML = "Keep playing to earn more rewards 🚀";
  list.appendChild(msg);
}

</script>

</body>
  </html>
