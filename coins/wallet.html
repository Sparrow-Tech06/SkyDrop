<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/wallet.css">
</head>
<body>

    <div class="sticky-wrapper">
        <div class="header">
            <div class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></div>
            <h6 class="m-0 fw-bold">Wallet Passbook</h6>
        </div>

        <div class="balance-card">
            <div class="balance-label">AVAILABLE BALANCE</div>
            <div class="balance-value">
                <i class="bi bi-coin"></i>
                <span id="coinAmount">0</span>
            </div>
        </div>
    </div>

    <h2 class="section-title">TRANSACTION HISTORY</h2>

    <div id="historyList" class="history-list">
        <div class="history-card">
            <div class="skeleton sk-icon"></div>
            <div class="info-col">
                <div class="skeleton sk-text-top"></div>
                <div class="skeleton sk-text-btm"></div>
            </div>
            <div class="skeleton sk-amt"></div>
        </div>
        <div class="history-card"><div class="skeleton sk-icon"></div><div class="info-col"><div class="skeleton sk-text-top"></div><div class="skeleton sk-text-btm"></div></div><div class="skeleton sk-amt"></div></div>
        <div class="history-card"><div class="skeleton sk-icon"></div><div class="info-col"><div class="skeleton sk-text-top"></div><div class="skeleton sk-text-btm"></div></div><div class="skeleton sk-amt"></div></div>
    </div>

    <script src="js/wallet.js" defer> </script>
    
</body>
</html>
