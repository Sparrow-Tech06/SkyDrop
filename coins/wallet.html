<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Wallet page showing coin balance and earning history">
<title>Wallet</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

:root{
  --primary:#2563eb;
  --success:#16a34a;
  --text:#111827;
  --muted:#6b7280;
}

/* Base */
body{
  margin:0;
  background:#fff;
  font-family: system-ui, -apple-system;
  color:var(--text);
}

/* App Bar */
header{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
  padding:14px 16px;
  border-bottom:1px solid #eee;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

header h1{
  font-size:18px;
  margin:0;
  font-weight:600;
}

/* Balance Card */
.balance-card{
  margin:15px;
  padding:20px;
  border-radius:18px;
  background:#f9fafb;
  text-align:center;
  animation:fadeUp 0.5s ease;
}

.balance-card h2{
  font-size:32px;
  font-weight:700;
  margin:5px 0;
}

/* History Section */
section{
  padding:0 15px 20px;
}

section h2{
  font-size:14px;
  color:var(--muted);
  margin-bottom:10px;
}

/* List */
.history-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
  background:#fafafa;
  transition:0.2s;
  animation:fadeUp 0.4s ease;
}

.history-item:hover{
  transform:scale(1.02);
}

/* Icon */
.icon-box{
  width:42px;
  height:42px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:18px;
}

/* nth-child colors */
.history-item:nth-child(5n+1) .icon-box{background:#2563eb;}
.history-item:nth-child(5n+2) .icon-box{background:#16a34a;}
.history-item:nth-child(5n+3) .icon-box{background:#ea580c;}
.history-item:nth-child(5n+4) .icon-box{background:#db2777;}
.history-item:nth-child(5n+5) .icon-box{background:#0891b2;}

/* Text */
.details{
  flex:1;
}

.amount{
  font-weight:600;
  color:var(--success);
}

.date{
  font-size:12px;
  color:var(--muted);
}

/* Empty */
.empty{
  text-align:center;
  padding:30px;
  color:var(--muted);
}

/* Animations */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>

</head>

<body>

<!-- App Bar -->
<header>
  <h1>My Wallet</h1>
  <i class="bi bi-wallet2 fs-5 text-primary"></i>
</header>

<main>

<!-- Balance -->
<section class="balance-card">
  <p class="text-muted mb-1">Total Coins</p>
  <h2 id="coinBalance">0</h2>
</section>

<!-- History -->
<section>
  <h2>Transaction History</h2>
  <div id="historyList"></div>
</section>

</main>

<script>

/* Load Data */
let coins = parseInt(localStorage.getItem("coins")) || 0;
let history = JSON.parse(localStorage.getItem("coinHistory")) || [];

/* Smooth Counter Animation */
let display = document.getElementById("coinBalance");
let start = 0;

function animateCounter(){
  let step = Math.ceil(coins / 30);
  let interval = setInterval(()=>{
    start += step;
    if(start >= coins){
      start = coins;
      clearInterval(interval);
    }
    display.innerText = start;
  },20);
}

animateCounter();

/* Render History */
let list = document.getElementById("historyList");

if(history.length === 0){
  list.innerHTML = `<div class="empty">No transactions yet</div>`;
}else{
  history.reverse().forEach((h,i)=>{
    let item = document.createElement("div");
    item.className = "history-item";
    item.style.animationDelay = (i * 0.05) + "s";

    item.innerHTML = `
      <div class="icon-box">
        <i class="bi bi-coin"></i>
      </div>

      <div class="details">
        <div class="amount">+${h.reward} coins</div>
        <div>${h.quiz}</div>
        <div class="date">${h.date}</div>
      </div>
    `;

    list.appendChild(item);
  });
}

</script>

</body>
</html>
