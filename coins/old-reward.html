<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Badges</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f5f5f5;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:15px;}
.card{background:#fff;border-radius:12px;padding:15px;text-align:center;}
.locked{opacity:.5;}
img{width:60px;}
</style>
</head>

<body>

<div class="grid" id="box"></div>

<script src="../js/reward-popup.js"></script>
<script src="../js/reward-engine.js"></script>

<script>

let coin = parseInt(localStorage.getItem("coins"))||0;

const BADGES = [
{name:"Rookie Drop",required:50,img:"../assets/badges/rookie-drop.png"},
{name:"Loot Hunter",required:100,img:"../assets/badges/Loot Hunter.png"},
{name:"Battle Scout",required:200,img:"../assets/badges/Puzzle Solver.png"},
{name:"Survivor Rank",required:400,img:"../assets/badges/Brain Booster.png"}
];

const box=document.getElementById("box");

BADGES.forEach(b=>{
 let unlocked=coin>=b.required;
 let div=document.createElement("div");
 div.className="card "+(unlocked?"":"locked");

 div.innerHTML=`
 <img src="${b.img}">
 <div>${b.name}</div>
 `;

 box.appendChild(div);
});

</script>

</body>
</html>
