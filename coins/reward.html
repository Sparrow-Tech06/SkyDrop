<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>SkyDrop Badges</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #ffffff; /* Clean White BG */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px 10px;
            color: #333;
        }

        .container-title {
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        .grid {
            display: grid; 
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;  
            max-width: 500px;  
            margin: 0 auto;
        }

        .badge-card {
            text-align: center;
            position: relative;
            padding-bottom: 10px;
        }

        /* Circular Frame from the Image */
        .badge-frame {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid #e2e8f0; /* Grey circular border */
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #f8fafc;
        }

        /* Lock Overlay logic */
        .lock-overlay {
            position: absolute;
            z-index: 3;
            background: rgba(255, 255, 255, 0.9);
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .lock-overlay i {
            font-size: 20px;
            color: #475569;
        }

        .badge-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            z-index: 1;
            transition: all 0.3s ease;
        }

        /* Unlocked State Adjustments */
        .unlocked .badge-frame {
            border-color: #cbd5e1; /* Slightly darker or you can use your theme color */
        }

        .unlocked .badge-img {
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        .unlocked .lock-overlay {
            display: none; /* Hide lock when unlocked */
        }

        /* Locked State Adjustments */
        .locked .badge-img {
            filter: grayscale(1);
            opacity: 0.2;
        }

        .badge-name {
            font-weight: 700;
            font-size: 15px;
            color: #1e293b;
            margin-bottom: 2px;
        }

        .points-label {
            color: #f97316; /* Orange color for points */
            font-weight: 800;
            font-size: 16px;
        }

        .status-text {
            font-size: 11px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-top: 4px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container-title">MY ACHIEVEMENTS</div>

<div class="grid" id="box"></div>

<script>
// Logic: User ke current coins check karein
let userCoins = parseInt(localStorage.getItem("coins")) || 750;

const badges = [
    {name:"Rookie Drop", required:300, img:"../assets/badges/rookie-drop.png"},
    {name:"Loot Hunter", required:500, img:"../assets/badges/Loot Hunter.png"},
    {name:"Battle Scout", required:1000, img:"../assets/badges/Puzzle Solver.png"},
    {name:"Survivor Rank", required:1500, img:"../assets/badges/Brain Booster.png"},
    {name:"Arena Fighter", required:2000, img:"../assets/badges/Equation Explorer.png"},
    {name:"Elite Dropper", required:2500, img:"../assets/badges/Logic Warrior.png"}
];

const box = document.getElementById("box");

badges.forEach(b => {
    let isUnlocked = userCoins >= b.required;
    let card = document.createElement("div");
    
    card.className = `badge-card ${isUnlocked ? "unlocked" : "locked"}`;

    card.innerHTML = `
        <div class="badge-frame">
            <div class="lock-overlay">
                <i class="fas fa-lock"></i>
            </div>
            <img class="badge-img" src="${b.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1175/1175571.png'">
        </div>
        <div class="badge-name">${b.name}</div>
        <div class="points-label">${b.required} PTS</div>
        <div class="status-text">${isUnlocked ? 'Unlocked' : 'Locked'}</div>
    `;

    box.appendChild(card);
});
</script>

</body>
</html>
