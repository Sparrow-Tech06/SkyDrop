<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Badges</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<link rel="stylesheet" href="../css/reward.css">
<link rel="stylesheet" href="../css/global.css">
    
</head>

<body>

    <header>
        <button class="back-btn" role="button" aria-label="Go back" onclick="window.history.back();">
           <i class="bi bi-arrow-left"></i>
       </button>
       <div class="title"> Notification </div>
  </header>

<div class="grid" id="box"></div>

<script src="../js/reward-popup.js"></script>
<script src="../js/reward-engine.js"></script>

<script>

let coin = parseInt(localStorage.getItem("coins"))||0;

const BADGES = [
{name:"Rookie Drop",required:50,img:"../assets/badges/rookie-drop.png"},
{name:"Loot Hunter",required:100,img:"../assets/badges/Loot Hunter.png"},
{name:"Battle Scout",required:130,img:"../assets/badges/Puzzle Solver.png"},
{name:"Survivor Rank",required:150,img:"../assets/badges/Brain Booster.png"}
];

const box=document.getElementById("box");

BADGES.forEach(b=>{
 let unlocked=coin>=b.required;
 let div=document.createElement("div");
 
 // Dynamic class assignment
 div.className = `card ${unlocked ? "unlocked unlocked-border" : "locked"}`;

 div.innerHTML=`
 <div class="status-icon">
    <i class="bi ${unlocked ? 'bi-patch-check-fill' : 'bi-lock-fill'}"></i>
 </div>
 <img src="${b.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1175/1175571.png'">
 <div class="name">${b.name}</div>
 <div class="req">${unlocked ? 'Achievement Unlocked' : b.required + ' Coins Needed'}</div>
 <div class="status-label">${unlocked ? 'Unlocked' : 'Locked'}</div>
 `;

 box.appendChild(div);
});

</script>

</body>
</html>
