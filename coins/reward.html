<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Modern Achievement Badges</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #38bdf8;
        }

        body {
            background: var(--primary-bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .coin-balance {
            color: #fbbf24;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .badge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .badge-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
            overflow: hidden;
        }

        /* Hover Effect for Unlocked Cards */
        .badge-card.unlocked:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        .badge-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .badge-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        /* Locked State UI */
        .locked-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .lock-icon {
            font-size: 1.5rem;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .requirement-text {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        /* Grayscale for locked images */
        .badge-card.is-locked .badge-img {
            filter: grayscale(1) contrast(0.5);
            opacity: 0.3;
        }

        .progress-mini {
            height: 4px;
            background: #334155;
            border-radius: 2px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="header-section">
    <h2>My Achievements</h2>
    <div class="coin-balance">
        <i class="fas fa-coins"></i> <span id="coin-count">0</span> Coins
    </div>
</div>

<div class="badge-grid" id="badge-container"></div>

<script>
    // Mock coins for testing (Change this or use your localStorage logic)
    let userCoins = parseInt(localStorage.getItem("coins")) || 120; 
    document.getElementById("coin-count").innerText = userCoins;

    const BADGES = [
        { name: "Rookie Drop", required: 50, img: "https://cdn-icons-png.flaticon.com/512/6198/6198527.png" },
        { name: "Loot Hunter", required: 100, img: "https://cdn-icons-png.flaticon.com/512/6198/6198550.png" },
        { name: "Battle Scout", required: 200, img: "https://cdn-icons-png.flaticon.com/512/6198/6198559.png" },
        { name: "Survivor Rank", required: 400, img: "https://cdn-icons-png.flaticon.com/512/6198/6198565.png" }
    ];

    const container = document.getElementById("badge-container");

    BADGES.forEach(badge => {
        const isUnlocked = userCoins >= badge.required;
        const card = document.createElement("div");
        
        // Dynamic Class logic
        card.className = `badge-card ${isUnlocked ? 'unlocked' : 'is-locked'}`;

        card.innerHTML = `
            ${!isUnlocked ? `
                <div class="locked-overlay">
                    <i class="fas fa-lock lock-icon"></i>
                    <span class="requirement-text">${badge.required} Coins</span>
                </div>
            ` : ''}
            <img src="${badge.img}" class="badge-img" alt="${badge.name}">
            <div class="badge-name">${badge.name}</div>
            ${isUnlocked ? '<span class="badge badge-sm bg-success">Unlocked</span>' : ''}
        `;

        container.appendChild(card);
    });
</script>

</body>
</html>
