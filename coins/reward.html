<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Premium Badges UI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
/* 1. Deep Gaming Gradient Background */
body { 
    background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%); 
    font-family: 'Inter', sans-serif; 
    color: #fff; 
    min-height: 100vh;
    display: flex;
    align-items: center; /* Vertically Center everything */
    justify-content: center; /* Horizontally Center */
    margin: 0;
    padding: 20px;
}

/* Page Title with soft light effect */
.page-header {
    text-align: center;
    font-weight: 800;
    font-size: 28px;
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 0 15px rgba(255,255,255,0.3);
}

.grid { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 25px; /* More gap for breathing space */
    max-width: 550px; 
    width: 100%;
}

/* 2. Modern Glassmorphism Card Style */
.card {
    background: rgba(255, 255, 255, 0.05); /* Semi-transparent */
    border-radius: 28px; /* Smooth corners */
    padding: 30px 15px;
    text-align: center;
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center; /* Center badge image inside card */
}

/* Hover/Active interaction */
.card:active { transform: scale(0.95); }

/* 3. Custom Lock/Unlock Styling */

/* UNLOCKED: Gold Theme */
.card.unlocked-border { 
    border: 1.5px solid #fbbf24 !important; /* Gold Border */
    background: rgba(251, 191, 36, 0.05); /* Very light gold tint */
    box-shadow: 0 15px 40px rgba(251, 191, 36, 0.15); /* Gold glow shadow */
}

/* LOCKED: Silver/Gray Theme */
.card.locked {
    background: rgba(148, 163, 184, 0.1); /* Silver tint */
    border: 1px solid rgba(148, 163, 184, 0.2);
}

/* Icon Container in top right */
.status-container {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 18px;
}

/* Icon Colors */
.locked .status-container { color: rgba(148, 163, 184, 0.6); } /* Dull silver */
.unlocked-border .status-container { 
    color: #fbbf24; /* Solid Gold */
    text-shadow: 0 0 10px rgba(251, 191, 36, 0.6);
}

img { 
    width: 90px; /* Slightly larger image */
    height: 90px; 
    object-fit: contain; 
    margin-bottom: 18px;
    transition: all 0.4s ease;
}

/* Locked image fades out and grays out */
.locked img { filter: grayscale(1) opacity(0.3); }

/* Badge Name & Req Styling */
.name { font-weight: 700; font-size: 15px; color: #fff; margin-bottom: 6px; display: block; }
.req { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 500; }

/* Purely cosmetic tag at the bottom */
.status-tag {
    margin-top: 15px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 5px 12px;
    border-radius: 50px;
    display: inline-block;
}
.unlocked-border .status-tag { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
.locked .status-tag { background: rgba(148, 163, 184, 0.1); color: rgba(148, 163, 184, 0.8); }

</style>
</head>

<body>

<div class="content-wrapper">
    <div class="page-header">Achievements</div>
    <div class="grid" id="box"></div>
</div>

<script src="../js/reward-popup.js"></script>
<script src="../js/reward-engine.js"></script>

<script>

let coin = parseInt(localStorage.getItem("coins"))||0;

// You can test with custom coin count for design:
// let coin = 750;

const BADGES = [
{name:"Rookie Drop",required:50,img:"../assets/badges/rookie-drop.png"},
{name:"Loot Hunter",required:100,img:"../assets/badges/Loot Hunter.png"},
{name:"Battle Scout",required:200,img:"../assets/badges/Puzzle Solver.png"},
{name:"Survivor Rank",required:400,img:"../assets/badges/Brain Booster.png"}
];

const box=document.getElementById("box");

BADGES.forEach(b=>{
 let unlocked=coin>=b.required;
 let div=document.createElement("div");
 
 // Class management
 div.className = `card ${unlocked ? "unlocked unlocked-border" : "locked"}`;

 // Updated innerHTML with Premium look
 div.innerHTML=`
 <div class="status-container">
    <i class="bi ${unlocked ? 'bi-trophy-fill' : 'bi-lock-fill'}"></i>
 </div>
 <img src="${b.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1175/1175571.png'">
 <div class="name">${b.name}</div>
 <div class="req">${unlocked ? 'Unlocked' : b.required + ' Coins'}</div>
 <div class="status-tag">${unlocked ? 'Achieved' : 'Locked'}</div>
 `;

 box.appendChild(div);
});

</script>

</body>
</html>
