<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Rewards - Badges</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="../css/global.css" rel="stylesheet">
  
<style>
body{background:#f5f5f5;}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

.badge-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.badge-card{
  background:#fff;
  border-radius:12px;
  padding:15px;
  text-align:center;
}

.badge-card.locked{opacity:0.5;}

.badge-img{width:60px;height:60px;}
.badge-title{font-weight:600;margin-top:10px;}
</style>

</head>

<body>

<header>
<button class="btn btn-light" onclick="history.back()">
<i class="bi bi-arrow-left"></i>
</button>

<div class="fw-bold">Badges</div>

<div>
<i class="bi bi-coin"></i>
<span id="coinDisplay">0</span>
</div>
</header>

<main>
<div id="badgeContainer" class="badge-grid"></div>
</main>

<!-- ✅ GLOBAL POPUP -->
<script src="../js/reward-popup.js"></script>

<script>

// ===== COINS =====
let coin = parseInt(localStorage.getItem("coins")) || 0;
document.getElementById("coinDisplay").innerText = coin;

// ===== STORAGE SAFE =====
function getStorage(key){
  try{return JSON.parse(localStorage.getItem(key)) || [];}
  catch{return [];}
}
function setStorage(key,val){
  localStorage.setItem(key, JSON.stringify(val));
}

let unlockedBadges = getStorage("unlockedBadges");

// ===== BADGE DATA =====
const badges = [
{name:"Rookie Drop",required:50,img:"../assets/badges/rookie-drop.png"},
{name:"Loot Hunter",required:100,img:"../assets/badges/Loot Hunter.png"},
{name:"Battle Scout",required:200,img:"../assets/badges/Puzzle Solver.png"},
{name:"Survivor Rank",required:400,img:"../assets/badges/Brain Booster.png"},
{name:"Arena Fighter",required:600,img:"../assets/badges/Equation Explorer.png"},
{name:"Elite Dropper",required:900,img:"../assets/badges/Logic Warrior.png"},
{name:"Victory Seeker",required:1200,img:"../assets/badges/Mind Hacker.png"},
{name:"Diamond Raider",required:1500,img:"../assets/badges/Math Strategist.png"},
{name:"Legend Striker",required:1800,img:"../assets/badges/Number Legend.png"},
{name:"SkyDrop Pro",required:2200,img:"../assets/badges/QMath Master.png"}
];

// ===== RENDER =====
function generateBadges(){

const container = document.getElementById("badgeContainer");
container.innerHTML = "";

badges.forEach(badge=>{

const unlocked = coin >= badge.required;
const percent = Math.min((coin / badge.required) * 100, 100);

// ✅ UNLOCK TRIGGER
if(unlocked && !unlockedBadges.includes(badge.name)){
  unlockedBadges.push(badge.name);
  setStorage("unlockedBadges", unlockedBadges);

  setTimeout(()=>{
    window.onRewardUnlocked({
      type:"badge",
      title:badge.name,
      subtitle:"Badge Unlocked 🎉",
      icon:badge.img
    });
  },100);
}

const card = document.createElement("div");
card.className = "badge-card " + (unlocked ? "" : "locked");

card.innerHTML = `
<img src="${badge.img}" class="badge-img">
<div class="badge-title">${badge.name}</div>
<div class="progress mt-2">
<div class="progress-bar" style="width:${percent}%"></div>
</div>
`;

container.appendChild(card);

});

}

generateBadges();

</script>

</body>
</html>
