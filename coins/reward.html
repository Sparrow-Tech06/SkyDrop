<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">       

<title>Rewards</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="../css/reward.css" rel="stylesheet">
</head>


<body>

<header>

<button class="back-btn" onclick="history.back()">
<i class="bi bi-arrow-left"></i>
</button>

<div class="header-title">Rewards</div>

<div class="coin">
<i class="bi bi-coin"></i>
<span id="coinDisplay">0</span>
</div>

</header>


<main>

<div id="badgeContainer" class="badge-grid"></div>

</main>


<!-- modal -->

<div class="modal fade" id="badgeModal">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content">

<div id="modalStatusBanner" class="modal-status"></div>

<div class="modal-body text-center">

<img id="modalImg" class="modal-badge mb-3">

<h5 id="modalTitle"></h5>

<p id="modalText" class="text-muted small"></p>

<div class="progress">
<div id="modalProgress" class="progress-bar"></div>
</div>

<button class="btn btn-primary w-100 mt-4" data-bs-dismiss="modal">
OK
</button>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

let db;
let coin=0;

const request=indexedDB.open("QuizWallet",1);

request.onsuccess=function(e){

db=e.target.result;

loadCoins();

};


/* load wallet coins */

function loadCoins(){

const tx=db.transaction("wallet","readonly");
const store=tx.objectStore("wallet");

const get=store.get("user");

get.onsuccess=function(){

coin = get.result ? get.result.coins : 0;

document.getElementById("coinDisplay").innerText=coin;

generateBadges();

};

}



/* badge system */

const badges=[

{name:"Rookie Drop",required:100,img:"../assets/badges/rookie-drop.png"},
{name:"Loot Hunter",required:200,img:"../assets/badges/Number Rookie.png"},
{name:"Battle Scout",required:400,img:"../assets/badges/Puzzle Solver.png"},
{name:"Survivor Rank",required:600,img:"../assets/badges/Brain Booster.png"},
{name:"Arena Fighter",required:900,img:"../assets/badges/Equation Explorer.png"},
{name:"Elite Dropper",required:1200,img:"../assets/badges/Logic Warrior.png"},
{name:"Victory Seeker",required:1500,img:"../assets/badges/Mind Hacker.png"},
{name:"Diamond Raider",required:1800,img:"../assets/badges/Math Strategist.png"},
{name:"Legend Striker",required:2200,img:"../assets/badges/Number Legend.png"},
{name:"SkyDrop Pro",required:2500,img:"../assets/badges/QMath Master.png"}

];


function generateBadges(){

const container=document.getElementById("badgeContainer");

container.innerHTML="";

badges.forEach(badge=>{

const unlocked=coin>=badge.required;

const percent=Math.min((coin/badge.required)*100,100);

const card=document.createElement("div");

card.className="badge-card "+(unlocked?"":"locked");

card.innerHTML=`

<img src="${badge.img}" class="badge-img">

<div class="badge-title">${badge.name}</div>

<div class="progress">
<div class="progress-bar" style="width:${percent}%"></div>
</div>

`;

card.onclick=()=>openModal(badge,unlocked,percent);

container.appendChild(card);

});

}



/* modal */

function openModal(badge,unlocked,percent){

const banner=document.getElementById("modalStatusBanner");

const img=document.getElementById("modalImg");

img.src=badge.img;

img.classList.toggle("locked",!unlocked);

document.getElementById("modalTitle").innerText=badge.name;

document.getElementById("modalText").innerText=
unlocked
? "You unlocked this badge."
: `Collect ${badge.required} coins to unlock this badge.`;

document.getElementById("modalProgress").style.width=percent+"%";

if(unlocked){

banner.innerText="🎉 Badge Unlocked";

banner.className="modal-status status-unlocked";

}else{

banner.innerText="🔒 Badge Locked";

banner.className="modal-status status-locked";

}

new bootstrap.Modal(document.getElementById("badgeModal")).show();

}

</script>

</body>
</html>
