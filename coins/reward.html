<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rewards</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#fff;
font-family:'Inter',sans-serif;
margin:0;
}

header{
display:flex;
align-items:center;
padding:14px 16px;
border-bottom:1px solid #eee;
gap:10px;
position:sticky;
top:0;
background:#fff;
z-index:10;
}

.back-btn{
border:none;
background:#e3e3e3;
width:38px;
height:38px;
border-radius:50%;
font-size:18px;
}

.header-title{
font-weight:600;
font-size:16px;
}

.coin{
margin-left:auto;
font-size:14px;
color:#666;
display:flex;
align-items:center;
gap:5px;
}

main{
padding:16px;
}

.badge-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.badge-card{
border:1px solid #eee;
border-radius:14px;
padding:14px;
text-align:center;
cursor:pointer;
background:#fafafa;
}

.badge-img{
width:70px;
height:70px;
object-fit:contain;
margin-bottom:8px;
}

.locked .badge-img{
filter:grayscale(100%);
opacity:.4;
}

.badge-title{
font-weight:600;
font-size:14px;
}

.progress{
height:6px;
border-radius:20px;
margin-top:8px;
}

.progress-bar{
background:#0d6efd;
}

/* modal */

.modal-status{
color:#fff;
padding:10px;
font-weight:600;
text-align:center;
}

.status-unlocked{
background:#22c55e;
}

.status-locked{
background:#6b7280;
}

.modal-badge{
width:110px;
display:block;
margin:auto;
}

.modal-badge.locked{
filter:blur(3px) grayscale(100%);
opacity:.6;
}

</style>
</head>


<body>

<header>

<button class="back-btn" onclick="history.back()">
<i class="bi bi-arrow-left"></i>
</button>

<div class="header-title">Rewards</div>

<div class="coin">
<i class="bi bi-coin"></i>
<span id="coinDisplay">0</span>
</div>

</header>


<main>

<div id="badgeContainer" class="badge-grid"></div>

</main>


<!-- modal -->

<div class="modal fade" id="badgeModal">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content">

<div id="modalStatusBanner" class="modal-status"></div>

<div class="modal-body text-center">

<img id="modalImg" class="modal-badge mb-3">

<h5 id="modalTitle"></h5>

<p id="modalText" class="text-muted small"></p>

<div class="progress">
<div id="modalProgress" class="progress-bar"></div>
</div>

<button class="btn btn-primary w-100 mt-4" data-bs-dismiss="modal">
OK
</button>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

let db;
let coin=0;

const request=indexedDB.open("QuizWallet",1);

request.onsuccess=function(e){

db=e.target.result;

loadCoins();

};


/* load wallet coins */

function loadCoins(){

const tx=db.transaction("wallet","readonly");
const store=tx.objectStore("wallet");

const get=store.get("user");

get.onsuccess=function(){

coin = get.result ? get.result.coins : 0;

document.getElementById("coinDisplay").innerText=coin;

generateBadges();

};

}



/* badge system */

const badges=[

{name:"Starter Spark",required:100,img:"../assets/badges/Starter Spark.png"},
{name:"Number Rookie",required:200,img:"../assets/badges/Number Rookie.png"},
{name:"Puzzle Solver",required:400,img:"../assets/badges/Puzzle Solver.png"},
{name:"Brain Booster",required:600,img:"../assets/badges/Brain Booster.png"},
{name:"Equation Explorer",required:900,img:"../assets/badges/Equation Explorer.png"},
{name:"Logic Warrior",required:1200,img:"../assets/badges/Logic Warrior.png"},
{name:"Mind Hacker",required:1500,img:"../assets/badges/Mind Hacker.png"},
{name:"Math Strategist",required:1800,img:"../assets/badges/Math Strategist.png"},
{name:"Number Legend",required:2200,img:"../assets/badges/Number Legend.png"},
{name:"QMath Master",required:2500,img:"../assets/badges/QMath Master.png"}

];


function generateBadges(){

const container=document.getElementById("badgeContainer");

container.innerHTML="";

badges.forEach(badge=>{

const unlocked=coin>=badge.required;

const percent=Math.min((coin/badge.required)*100,100);

const card=document.createElement("div");

card.className="badge-card "+(unlocked?"":"locked");

card.innerHTML=`

<img src="${badge.img}" class="badge-img">

<div class="badge-title">${badge.name}</div>

<div class="progress">
<div class="progress-bar" style="width:${percent}%"></div>
</div>

`;

card.onclick=()=>openModal(badge,unlocked,percent);

container.appendChild(card);

});

}



/* modal */

function openModal(badge,unlocked,percent){

const banner=document.getElementById("modalStatusBanner");

const img=document.getElementById("modalImg");

img.src=badge.img;

img.classList.toggle("locked",!unlocked);

document.getElementById("modalTitle").innerText=badge.name;

document.getElementById("modalText").innerText=
unlocked
? "You unlocked this badge."
: `Collect ${badge.required} coins to unlock this badge.`;

document.getElementById("modalProgress").style.width=percent+"%";

if(unlocked){

banner.innerText="🎉 Badge Unlocked";

banner.className="modal-status status-unlocked";

}else{

banner.innerText="🔒 Badge Locked";

banner.className="modal-status status-locked";

}

new bootstrap.Modal(document.getElementById("badgeModal")).show();

}

</script>

</body>
</html>
