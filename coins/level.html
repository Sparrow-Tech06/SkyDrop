<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>My Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0f1012;
        --card: #1c1e22;
        --accent: #3b82f6; /* Modern Blue */
        --text-dim: #94a3b8;
    }

    body {
        background: var(--bg);
        color: white;
        font-family: 'Inter', sans-serif;
        margin: 0; padding: 20px;
        -webkit-tap-highlight-color: transparent;
    }

    /* Current Status Card */
    .status-card {
        background: var(--card);
        padding: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255,255,255,0.05);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        margin-bottom: 25px;
    }

    .level-label {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-dim);
        display: block;
        margin-bottom: 5px;
    }

    .level-number {
        font-size: 2.2rem;
        font-weight: 700;
        margin-bottom: 15px;
        display: block;
    }

    /* Progress Bar */
    .progress-container {
        height: 8px;
        background: #2d3139;
        border-radius: 10px;
        overflow: hidden;
        margin: 15px 0;
    }

    #progressBar {
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        width: 0%;
        transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .dist-text {
        font-size: 0.9rem;
        color: var(--text-dim);
    }

    .coin-val { color: #facc15; font-weight: 600; }

    /* Quick Links / Grid */
    .nav-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        margin-top: 20px;
    }

    .nav-item {
        background: var(--card);
        padding: 18px;
        border-radius: 20px;
        text-decoration: none;
        color: white;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.05);
        transition: transform 0.2s;
    }

    .nav-item:active { transform: scale(0.95); }

    .nav-item span {
        display: block;
        font-size: 0.8rem;
        color: var(--text-dim);
        margin-top: 5px;
    }

    /* Header Slim */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding: 0 5px;
    }
    .user-coins {
        background: rgba(250, 204, 21, 0.1);
        color: #facc15;
        padding: 6px 12px;
        border-radius: 12px;
        font-size: 0.9rem;
        font-weight: 600;
    }
</style>
</head>
<body>

<div class="header">
    <h2 style="font-size: 1.4rem; margin:0;">Dashboard</h2>
    <div class="user-coins" id="coinCounter">0 🪙</div>
</div>

<div class="status-card">
    <span class="level-label">Current Status</span>
    <span class="level-number" id="curLevel">Level 1</span>
    
    <div class="progress-container">
        <div id="progressBar"></div>
    </div>
    
    <p class="dist-text" id="distText">Loading status...</p>
</div>

<div class="nav-grid">
    <a href="badges.html" class="nav-item">
        🏅 Badges
        <span>Achievements</span>
    </a>
    <a href="explore.html" class="nav-item">
        🚀 Explore
        <span>New Tasks</span>
    </a>
    <a href="history.html" class="nav-item" style="grid-column: span 2;">
        📜 Coin History
        <span>View all transactions</span>
    </a>
</div>

<script>
let coin = parseInt(localStorage.getItem("coins")) || 0;
document.getElementById("coinCounter").innerText = `${coin} 🪙`;

const LEVELS = [
    {level: 1, required: 0},
    {level: 2, required: 100},
    {level: 3, required: 300},
    {level: 4, required: 700},
    {level: 5, required: 1500},
    {level: 6, required: 3000}
];

function updateUI() {
    let currentLvl = LEVELS[0];
    let nextLvl = null;

    // Current Level find karein
    for (let i = 0; i < LEVELS.length; i++) {
        if (coin >= LEVELS[i].required) {
            currentLvl = LEVELS[i];
            nextLvl = LEVELS[i + 1];
        }
    }

    const curLevelEl = document.getElementById("curLevel");
    const distTextEl = document.getElementById("distText");
    const progressEl = document.getElementById("progressBar");

    curLevelEl.innerText = `Level ${currentLvl.level}`;

    if (nextLvl) {
        let needed = nextLvl.required - coin;
        let totalRange = nextLvl.required - currentLvl.required;
        let currentProgress = coin - currentLvl.required;
        let percent = (currentProgress / totalRange) * 100;

        distTextEl.innerHTML = `Need <span class="coin-val">${needed}</span> more coins for Level ${nextLvl.level}`;
        progressEl.style.width = percent + "%";
    } else {
        distTextEl.innerText = "Max Level Reached! 🏆";
        progressEl.style.width = "100%";
    }
}

updateUI();
</script>

</body>
</html>
