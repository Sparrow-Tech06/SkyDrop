<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Rewards - Level</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f5f5f5;}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

.level-container{padding:15px;}

.level-card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}
</style>

</head>

<body>

<header>
<button class="btn btn-light" onclick="history.back()">←</button>
<div class="fw-bold">Levels</div>
<div></div>
</header>

<div class="level-container" id="levelContainer"></div>

<!-- ✅ GLOBAL POPUP -->
<script src="../js/reward-popup.js"></script>

<script>

// ===== COINS =====
let coin = parseInt(localStorage.getItem("coins")) || 0;

// ===== STORAGE =====
function getStorage(key){
  try{return JSON.parse(localStorage.getItem(key)) || [];}
  catch{return [];}
}
function setStorage(key,val){
  localStorage.setItem(key, JSON.stringify(val));
}

let unlockedLevels = getStorage("unlockedLevels");

// ===== LEVEL DATA (EDIT HERE) =====
const levels = [
{level:1, required:0, name:"Beginner"},
{level:2, required:100, name:"Rookie"},
{level:3, required:300, name:"Fighter"},
{level:4, required:700, name:"Warrior"},
{level:5, required:1200, name:"Elite"},
{level:6, required:1800, name:"Master"},
{level:7, required:2500, name:"Legend"}
];

// ===== RENDER =====
function generateLevels(){

const container = document.getElementById("levelContainer");
container.innerHTML = "";

levels.forEach((lvl,i)=>{

const unlocked = coin >= lvl.required;

// ✅ PROGRESS FIX
let percent = 100;
let next = levels[i+1];

if(next){
  let range = next.required - lvl.required;
  let progress = coin - lvl.required;
  percent = Math.min((progress / range) * 100, 100);
}

// ✅ UNLOCK TRIGGER
if(unlocked && !unlockedLevels.includes(lvl.level)){
  unlockedLevels.push(lvl.level);
  setStorage("unlockedLevels", unlockedLevels);

  setTimeout(()=>{
    window.onRewardUnlocked({
      type:"level",
      title:`Level ${lvl.level}`,
      subtitle:`${lvl.name} Unlocked 🔥`,
      icon:"../assets/levels/level.png"
    });
  },100);
}

const div = document.createElement("div");
div.className = "level-card";

div.innerHTML = `
<h5>Level ${lvl.level} - ${lvl.name}</h5>
<div class="progress">
<div class="progress-bar" style="width:${percent}%"></div>
</div>
`;

container.appendChild(div);

});

}

generateLevels();

</script>

</body>
</html>
