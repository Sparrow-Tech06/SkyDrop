<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Levels</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f5f5f5;}
.box{padding:15px;}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:10px;}
</style>
</head>

<body>

<div id="lvlBox" class="box"></div>

<script src="../js/reward-popup.js"></script>
<script src="../js/reward-engine.js"></script>

<script>

let coin=parseInt(localStorage.getItem("coins"))||0;

const LEVELS=[
{level:1, required:0, name:"Beginner"},
{level:2, required:100, name:"Rookie"},
{level:3, required:300, name:"Fighter"},
{level:4, required:700, name:"Warrior"}
];

const box=document.getElementById("lvlBox");

LEVELS.forEach(l=>{
 let unlocked=coin>=l.required;

 let div=document.createElement("div");
 div.className="card";

 div.innerHTML=`
 <b>Level ${l.level}</b> - ${l.name}
 `;

 box.appendChild(div);
});

</script>

</body>
</html>
