<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Pro Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <link href="../css/global.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary-bg: #09090b;
            --card-bg: linear-gradient(135deg,#fff7ed,#fef3c7) ;
            --action-card: ;
            --action-card-bdr: ;
            --accent-blue: #3b82f6;
            --text-muted: #a1a1aa;
        }
/*********************************/
        .coin-pill {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--accent-blue);
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

/**************** Hero Card (Current Level) ***************/
        .level-card {
            background: linear-gradient(145deg, #1e1e22, #121214);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .level-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(59,130,246,0.1), transparent 70%);
        }

        .level-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .level-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 5px 0 20px 0;
            background: linear-gradient(to right, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Slim Progress Bar */
        .progress-wrapper {
            background: #27272a;
            height: 6px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent-blue);
            border-radius: 10px;
            width: 0%;
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .dist-info {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

/****************** Action Cards *******************/
        .action-card {
            background: var(--action-card);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 20px;
            height: 100%;
            transition: all 0.2s;
            text-decoration: none !important;
            color: inherit !important;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .icon-box {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 5px;
        }
        
    </style>
</head>
<body>

    <header class="header top-nav d-flex justify-content-between align-items-center px-3 py-2">
        <button class="back-btn" role="button" aria-label="Go back" onclick="window.history.back();">
           <i class="bi bi-arrow-left"></i>
       </button>
        <div class="coin-pill">
            <i data-lucide="database" size="16"></i>
            <span id="coinDisplay">0</span>
        </div>
    </header>
    
<div class="container">
    <div class="level-card mt-2">
        <span class="level-badge">Current Level</span>
        <h1 class="level-title" id="lvlName">Level --</h1>
        
        <div class="progress-wrapper">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        
        <div class="d-flex justify-content-between align-items-center">
            <span class="dist-info" id="distMsg">Updating status...</span>
            <i data-lucide="chevron-right" class="text-muted" size="18"></i>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-6">
            <a href="explore.html" class="action-card">
                <div class="icon-box"><i data-lucide="compass" class="text-info" size="20"></i></div>
                <div>
                    <div class="fw-bold">Explore</div>
                    <small class="text-secondary">Discover tasks</small>
                </div>
            </a>
        </div>
        <div class="col-6">
            <a href="reward.html" class="action-card">
                <div class="icon-box"><i data-lucide="award" class="text-warning" size="20"></i></div>
                <div>
                    <div class="fw-bold">Badges</div>
                    <small class="text-secondary">Your collection</small>
                </div>
            </a>
        </div>
        <div class="col-12">
            <a href="wallet.html" class="action-card">
                <div class="d-flex align-items-center gap-3">
                    <div class="icon-box m-0"><i data-lucide="history" class="text-success" size="20"></i></div>
                    <div>
                        <div class="fw-bold">Transaction History</div>
                        <small class="text-secondary">View your coin logs and rewards</small>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>


<script>
    // Lucide icons initialize
    lucide.createIcons();

    // Data Logic
    let coin = parseInt(localStorage.getItem("coins")) || 0;
    document.getElementById("coinDisplay").innerText = coin.toLocaleString();

    const LEVELS = [
        {level: 1, required: 0},
        {level: 2, required: 100},
        {level: 3, required: 500},
        {level: 4, required: 1200},
        {level: 5, required: 3000}
    ];

    function calculateProgress() {
        let currentLvl = LEVELS[0];
        let nextLvl = null;

        for (let i = 0; i < LEVELS.length; i++) {
            if (coin >= LEVELS[i].required) {
                currentLvl = LEVELS[i];
                nextLvl = LEVELS[i + 1];
            }
        }

        const lvlName = document.getElementById("lvlName");
        const distMsg = document.getElementById("distMsg");
        const progressFill = document.getElementById("progressFill");

        lvlName.innerText = `Level ${currentLvl.level}`;

        if (nextLvl) {
            let needed = nextLvl.required - coin;
            let range = nextLvl.required - currentLvl.required;
            let currentInLvl = coin - currentLvl.required;
            let pct = (currentInLvl / range) * 100;

            progressFill.style.width = pct + "%";
            distMsg.innerHTML = `<b class="text-white">${needed}</b> more to reach Level ${nextLvl.level}`;
        } else {
            progressFill.style.width = "100%";
            distMsg.innerText = "Ultimate Champion Level reached!";
        }
    }

    // Delay for smooth progress animation on load
    setTimeout(calculateProgress, 300);
</script>

</body>
</html>
