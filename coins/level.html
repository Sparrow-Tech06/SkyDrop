<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Level</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.level-box{
  padding:20px;
  text-align:center;
}
.level-card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}
</style>

</head>

<body>

<div class="container mt-3">

<h4 class="text-center mb-3">Your Level</h4>

<div id="levelContainer"></div>

</div>

<script src="/js/reward-popup.js"></script>

<script>

let coin = parseInt(localStorage.getItem("coins")) || 0;

// ✅ Track unlocked levels
let unlockedLevels = JSON.parse(localStorage.getItem("unlockedLevels")) || [];

// ✅ LEVEL DATA (EASILY SCALABLE)
const levels = [
{level:1, required:0, name:"Beginner"},
{level:2, required:100, name:"Rookie"},
{level:3, required:300, name:"Fighter"},
{level:4, required:700, name:"Warrior"},
{level:5, required:1200, name:"Elite"},
{level:6, required:1800, name:"Master"},
{level:7, required:2500, name:"Legend"}
];

function generateLevels(){

const container = document.getElementById("levelContainer");
container.innerHTML = "";

levels.forEach(lvl=>{

const unlocked = coin >= lvl.required;

// ✅ Popup trigger
if(unlocked && !unlockedLevels.includes(lvl.level)){
  unlockedLevels.push(lvl.level);
  localStorage.setItem("unlockedLevels", JSON.stringify(unlockedLevels));

  window.onRewardUnlocked({
    type:"level",
    title:`Level ${lvl.level}`,
    subtitle:`${lvl.name} Unlocked 🔥`,
    icon:"../assets/levels/level.png"
  });
}

const percent = Math.min((coin / lvl.required) * 100,100);

const div = document.createElement("div");
div.className = "level-card";

div.innerHTML = `
<h5>Level ${lvl.level} - ${lvl.name}</h5>
<div class="progress">
<div class="progress-bar" style="width:${percent}%"></div>
</div>
`;

container.appendChild(div);

});

}

generateLevels();

</script>

</body>
</html>
