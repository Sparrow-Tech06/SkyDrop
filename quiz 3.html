<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>
:root{
  --bg:#1c1c1e;
  --card:#2c2c2e;
  --accent:#ff6a00;
  --text:#fff;
  --soft:#3a3a3c;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* TIMER BAR */
.timer-bar{
  height:6px;
  background:var(--soft);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:15px;
}
.timer-fill{
  height:100%;
  background:var(--accent);
  transition:width 1s linear;
}

/* CARD */
.card-box{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  border:2px solid var(--accent);
}

/* OPTIONS */
.option{
  background:var(--soft);
  padding:14px;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  transition:0.25s;
}
.option.active{
  background:var(--accent);
}

/* TRANSITION */
.slide-enter-active, .slide-leave-active{
  transition: all 0.3s ease;
}
.slide-enter-from{
  opacity:0;
  transform:translateX(40px);
}
.slide-leave-to{
  opacity:0;
  transform:translateX(-40px);
}

/* RESULT */
.result-card{
  background:var(--card);
  padding:25px;
  border-radius:16px;
  border:2px solid var(--accent);
  text-align:center;
}

</style>
</head>

<body>

<div id="app" class="container py-4">

  <!-- HEADER -->
  <div class="header mb-3">
    <h5>{{ quizTitle }}</h5>
    <div>{{ current+1 }}/{{ questions.length }}</div>
  </div>

  <!-- TIMER -->
  <div class="timer-bar">
    <div class="timer-fill" :style="{width: timerWidth + '%'}"></div>
  </div>

  <!-- QUIZ -->
  <div v-if="!finished">

    <transition name="slide" mode="out-in">
      <div :key="current" class="card-box">

        <h5>{{ currentQ.question }}</h5>

        <div v-for="(opt,i) in currentQ.options"
             :key="i"
             class="option"
             :class="{active:selected===i}"
             @click="select(i)">

          <b>{{ labels[i] }}</b> {{ opt }}

        </div>

      </div>
    </transition>

  </div>

  <!-- RESULT -->
  <div v-else class="result-card">

    <h3>{{ message }}</h3>
    <h1>{{ score }} / {{ questions.length }}</h1>
    <p>💰 Coins: {{ score*10 }}</p>

    <button class="btn btn-warning mt-2" @click="restart">Play Again</button>

  </div>

</div>

<script src="js/mycoins.js"></script>

<script>
const { createApp } = Vue;

createApp({

data(){
  return{
    quizId:null,
    quizTitle:"",
    questions:[],
    current:0,
    score:0,
    selected:null,
    finished:false,

    timer:4,
    timerWidth:100,
    interval:null,

    labels:["A.","B.","C.","D."]
  }
},

computed:{
  currentQ(){
    return this.questions[this.current] || {};
  },
  message(){
    if(this.score === this.questions.length) return "🔥 Pro Player!";
    if(this.score >= this.questions.length/2) return "😎 Good Try!";
    return "😅 Try Again!";
  }
},

methods:{

  startTimer(){
    this.timer = 4;
    this.timerWidth = 100;

    this.interval = setInterval(()=>{

      this.timer--;
      this.timerWidth = (this.timer/4)*100;

      if(this.timer <= 0){
        clearInterval(this.interval);
        this.handleNext();
      }

    },1000);
  },

  select(i){
    if(this.selected === null){
      this.selected = i;

      // score check
      if(i === this.currentQ.answer){
        this.score++;
      }
    }
  },

  handleNext(){

    // ❗ if not selected → stay
    if(this.selected === null){
      this.startTimer(); // restart timer
      return;
    }

    // move next
    this.selected = null;
    this.current++;

    if(this.current >= this.questions.length){
      this.finished = true;

      if(typeof mycoin === "function"){
        mycoin(this.quizId, this.quizTitle);
      }

      return;
    }

    this.startTimer();
  },

  restart(){
    location.reload();
  }

},

mounted(){

  const params = new URLSearchParams(location.search);
  this.quizId = params.get("quiz");

  fetch("data/quiz-data.json")
  .then(res=>res.json())
  .then(data=>{

    const quiz = data.quizzes.find(q=>q.id===this.quizId);

    this.quizTitle = quiz.title;
    this.questions = quiz.questions;

    this.startTimer();
  });

}

}).mount("#app");
</script>

</body>
</html>
